// ══════════════════════════════════════════
// VOICE RECORDER + STT + LLM 화자분리
// ══════════════════════════════════════════
let isRecording=false;
let recognition=null;
let recTranscript='';
let recChunks=[];
let mediaRecorder=null;
let audioChunks=[];
let audioStream=null;

function toggleRecord(){
  if(isRecording)stopRecord();else startRecord();
}

function startRecord(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){toast('이 브라우저에서 음성인식을 지원하지 않습니다');return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang='ko-KR';
  recTranscript='';
  recChunks=[];

  // 실시간 표시할 영역
  let liveEl=document.getElementById('recLive');
  if(!liveEl){
    liveEl=document.createElement('div');
    liveEl.id='recLive';
    liveEl.style.cssText='background:rgba(248,113,113,.1);border:1px solid var(--danger);border-radius:8px;padding:12px;margin:8px 0;font-size:13px;line-height:1.7;min-height:40px;white-space:pre-wrap';
    const blocks=document.getElementById('blocks');
    if(blocks)blocks.prepend(liveEl);
  }
  liveEl.innerHTML='<span style="color:var(--danger);font-weight:600">🔴 녹음 중...</span><br>';

  let lastTimestamp=Date.now();

  recognition.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal){
        final+=t;
        const now=Date.now();
        const pause=now-lastTimestamp;
        // 2초 이상 멈추면 화자 전환 가능성 표시
        if(pause>2000&&recTranscript.length>0)recTranscript+='\n[pause]\n';
        recTranscript+=t+'\n';
        recChunks.push({text:t,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),pause});
        lastTimestamp=now;
      }else{
        interim+=t;
      }
    }
    liveEl.innerHTML='<span style="color:var(--danger);font-weight:600">🔴 녹음 중... ('+recChunks.length+'문장)</span><br>'+
      esc(recTranscript)+'<span style="color:var(--dim)">'+esc(interim)+'</span>';
    liveEl.scrollTop=liveEl.scrollHeight;
  };

  recognition.onerror=(e)=>{
    if(e.error==='no-speech')return;
    toast('음성인식 오류: '+e.error);
  };

  recognition.onend=()=>{
    // continuous 모드에서 자동 재시작
    if(isRecording){try{recognition.start()}catch(e){}}
  };

  recognition.start();
  isRecording=true;

  // MediaRecorder로 오디오 파일 동시 녹음
  audioChunks=[];
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    audioStream=stream;
    mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});
    mediaRecorder.ondataavailable=(e)=>{if(e.data.size>0)audioChunks.push(e.data)};
    mediaRecorder.start(1000); // 1초 간격으로 청크 수집
  }).catch(err=>{
    toast('마이크 접근 실패: '+err.message);
  });

  // 버튼 변경
  const btn=document.querySelector('.rec-btn');
  if(btn){btn.textContent='⏹ 녹음 중지';btn.style.background='var(--danger)';btn.style.borderColor='var(--danger)';btn.style.color='#fff'}
  toast('🎙 녹음 시작');
}

function stopRecord(){
  if(recognition){recognition.stop();recognition=null}
  isRecording=false;
  const btn=document.querySelector('.rec-btn');
  if(btn){btn.textContent='🎙 녹음';btn.style.background='';btn.style.borderColor='';btn.style.color=''}

  // 오디오 파일 저장
  const saveAudioFile=()=>{
    if(!mediaRecorder||audioChunks.length===0)return Promise.resolve(null);
    return new Promise(resolve=>{
      mediaRecorder.onstop=async()=>{
        const blob=new Blob(audioChunks,{type:'audio/webm'});
        const now=new Date();
        const fileName='rec_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0')+String(now.getSeconds()).padStart(2,'0')+'.webm';
        try{
          const buf=await blob.arrayBuffer();
          const filePath=await window.nexus.saveAudio(fileName,buf);
          resolve({fileName,filePath});
        }catch(e){toast('오디오 저장 실패');resolve(null)}
      };
      if(mediaRecorder.state!=='inactive')mediaRecorder.stop();
      else resolve(null);
    });
  };

  const audioPromise=saveAudioFile();
  // 스트림 정리
  if(audioStream){audioStream.getTracks().forEach(t=>t.stop());audioStream=null}
  mediaRecorder=null;

  if(!recTranscript.trim()){
    audioPromise.then(info=>{
      if(info)toast('텍스트 없음, 오디오만 저장: '+info.fileName);
      else toast('녹음된 내용 없음');
    });
    return;
  }

  const liveEl=document.getElementById('recLive');
  if(liveEl)liveEl.innerHTML='<span style="color:var(--accent);font-weight:600">⏳ Claude가 화자 분리 + 정리 중...</span>';

  // Claude API로 화자 분리
  const apiKey=localStorage.getItem('nexus_api_key');
  if(apiKey){
    Promise.all([llmSpeakerDiarize(recTranscript,recChunks),audioPromise]).then(([result,audioInfo])=>{
      saveRecordingAsBlocks(result,audioInfo);
      if(liveEl)liveEl.remove();
    }).catch(err=>{
      toast('API 오류, 원본 텍스트로 저장');
      audioPromise.then(audioInfo=>{
        saveRecordingAsBlocks(recTranscript,audioInfo);
        if(liveEl)liveEl.remove();
      });
    });
  }else{
    audioPromise.then(audioInfo=>{
      saveRecordingAsBlocks(recTranscript,audioInfo);
      if(liveEl)liveEl.remove();
      toast('API 키 없어서 원본으로 저장. 화자 분리는 API 키 등록 후 가능');
    });
  }
}

async function llmSpeakerDiarize(transcript,chunks){
  const apiKey=localStorage.getItem('nexus_api_key');
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:4096,
      messages:[{role:'user',content:`다음은 회의/대화 녹음을 음성인식(STT)으로 변환한 텍스트입니다.
[pause]는 2초 이상 멈춤(화자 전환 가능성)을 나타냅니다.

이 텍스트를 분석해서:
1. 화자를 구분해주세요 (화자A, 화자B 등)
2. 대화 흐름에 맞게 정리해주세요
3. 핵심 내용 요약도 마지막에 추가해주세요

마크다운 형식으로 출력하세요:

## 회의 기록

**화자A**: 내용...
**화자B**: 내용...

## 핵심 요약
- 요약1
- 요약2

녹음 텍스트:
${transcript}`}]
    })
  });
  if(!resp.ok)throw new Error('API 오류');
  const data=await resp.json();
  return data.content[0].text;
}

function saveRecordingAsBlocks(text,audioInfo){
  const p2=pg();if(!p2||p2.type!=='memo')return;
  const now=new Date();
  const timeStr=now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  // 마크다운을 블록으로 변환
  const lines=text.split('\n');
  const newBlocks=[
    {id:gid(),type:'divider',content:''},
    {id:gid(),type:'h2',content:'🎙 녹음 기록 ('+timeStr+')'},
  ];

  // 오디오 파일이 있으면 재생 블록 추가
  if(audioInfo&&audioInfo.filePath){
    newBlocks.push({id:gid(),type:'audio',content:audioInfo.fileName,audioPath:audioInfo.filePath});
  }

  lines.forEach(line=>{
    line=line.trim();
    if(!line)return;
    if(line.startsWith('## '))newBlocks.push({id:gid(),type:'h2',content:line.slice(3)});
    else if(line.startsWith('### '))newBlocks.push({id:gid(),type:'h3',content:line.slice(4)});
    else if(line.startsWith('- '))newBlocks.push({id:gid(),type:'bullet',content:line.slice(2)});
    else if(line.startsWith('**'))newBlocks.push({id:gid(),type:'text',content:line});
    else if(line.startsWith('> '))newBlocks.push({id:gid(),type:'quote',content:line.slice(2)});
    else newBlocks.push({id:gid(),type:'text',content:line});
  });

  p2.blocks.push(...newBlocks);
  p2.updatedAt=new Date().toISOString();
  save();renderMemo(p2);
  toast('녹음 기록 저장 완료');
}

function addBlk(type){const p2=pg(),b={id:gid(),type,content:''};p2.blocks.push(b);p2.updatedAt=new Date().toISOString();autoSave();const el=mkBlk(b);document.getElementById('blocks').appendChild(el);if(type!=='divider'){el.focus();el.scrollIntoView({behavior:'smooth',block:'nearest'})}}

// 드래그로 여러 블록 선택
let dragSelecting=false, dragStartBlk=null;
document.addEventListener('mousedown',e=>{
  const blk=e.target.closest('.blk');
  if(!blk||!blk.dataset.bid||e.target.closest('.blk-actions')||e.target.closest('.multi-sel-bar'))return;
  if(e.button!==0)return;
  dragStartBlk=blk;
  dragSelecting=false;
});
document.addEventListener('mousemove',e=>{
  if(!dragStartBlk||e.buttons!==1)return;
  const blk=e.target.closest?.('.blk');
  if(!blk||!blk.dataset.bid||blk===dragStartBlk&&!dragSelecting)return;
  if(blk!==dragStartBlk)dragSelecting=true;
  if(dragSelecting){
    window.getSelection().removeAllRanges();
    const blocks=Array.from(document.querySelectorAll('#blocks .blk'));
    const si=blocks.indexOf(dragStartBlk),ei=blocks.indexOf(blk);
    if(si<0||ei<0)return;
    const from=Math.min(si,ei),to=Math.max(si,ei);
    blocks.forEach((b,i)=>b.classList.toggle('multi-sel',i>=from&&i<=to));
    updateSelBar();
  }
});
let dragJustFinished=false;
document.addEventListener('mouseup',()=>{
  if(dragSelecting){multiSelStart=dragStartBlk;dragJustFinished=true;setTimeout(()=>dragJustFinished=false,50)}
  dragStartBlk=null;dragSelecting=false;
});

document.addEventListener('click',e=>{
  if(dragJustFinished)return;
  const blk=e.target.closest('.blk');
  if(e.target.closest('.blk-actions')||e.target.closest('.multi-sel-bar'))return;
  if(!blk||!blk.dataset.bid){multiClear();return}

    const blocks=document.querySelectorAll('#blocks .blk');
    const arr=Array.from(blocks);
    const startIdx=arr.indexOf(multiSelStart);
    const endIdx=arr.indexOf(blk);
    const from=Math.min(startIdx,endIdx),to=Math.max(startIdx,endIdx);
    arr.forEach((b,i)=>b.classList.toggle('multi-sel',i>=from&&i<=to));

    multiClear();

  }
});

function rmBlk(bid){const p2=pg();if(p2.blocks.length<=1)return;p2.blocks.splice(p2.blocks.findIndex(b=>b.id===bid),1);p2.updatedAt=new Date().toISOString();save();renderMemo(p2)}
function showBM(anchor,bid){const m=document.getElementById('bmenu'),r=anchor.getBoundingClientRect();m.style.display='block';m.style.left=Math.min(r.left,innerWidth-200)+'px';m.style.top=Math.min(r.bottom+4,innerHeight-300)+'px';m.innerHTML=BT.map(t=>`<button onmousedown="chgBT('${bid}','${t.t}')">${t.l}<span class="hint">${t.h}</span></button>`).join('');setTimeout(()=>document.addEventListener('click',hideBM,{once:true}),10)}

function hideCtx(){document.getElementById('ctxMenu').style.display='none'}

  const typeLabels={text:'텍스트',h1:'제목1',h2:'제목2',h3:'제목3',bullet:'목록',todo:'할 일',quote:'인용',code:'코드',callout:'콜아웃',image:'이미지',divider:'구분선'};

  html+='<div class="ctx-section">아래에 삽입</div>';
  html+='<div style="display:flex;flex-wrap:wrap;gap:2px;padding:2px 4px">';
  html+=BT.map(t=>`<button style="flex:0 0 auto;padding:4px 7px;font-size:11px" onclick="insertBlkAt(${idx+1},'${t.t}');hideCtx()" title="${t.h}">${t.l}</button>`).join('');
  html+='</div>';
  html+='<div class="ctx-divider"></div>';
  html+='<div class="ctx-section">편집</div>';

  html+='<div class="ctx-divider"></div>';
  html+=`<button class="ctx-danger" onclick="rmBlk('${bid}');hideCtx()">🗑 삭제</button>`;
  m.innerHTML=html;
  m.style.display='block';
  // 위치 조정 (화면 벗어남 방지)
  const mx=Math.min(e.clientX,innerWidth-220);

  m.style.maxHeight=(innerHeight-20)+'px';m.style.overflowY='auto';

}
function wrapInColumns(bid){
  const p2=pg();if(!p2)return;
  const idx=p2.blocks.findIndex(b=>b.id===bid);
  const blk=p2.blocks[idx];if(!blk)return;
  // 이미 컬럼이면 컬럼 추가
  if(blk.type==='columns'){
    blk.cols.push([{id:gid(),type:'text',content:''}]);
    p2.updatedAt=new Date().toISOString();autoSave();renderMemo(p2);return;
  }
  // 블록을 컬럼으로 감싸기 (기존 내용 보존)
  const col1=[{id:blk.id,type:blk.type,content:blk.content||'',done:blk.done}];
  const col2=[{id:gid(),type:'text',content:''}];
  p2.blocks[idx]={id:gid(),type:'columns',cols:[col1,col2]};
  p2.updatedAt=new Date().toISOString();autoSave();renderMemo(p2);
}
function dupBlk(bid){
  const p2=pg();if(!p2)return;
  const idx=p2.blocks.findIndex(b=>b.id===bid);
  const orig=p2.blocks[idx];if(!orig)return;
  const nb={...orig,id:gid(),done:false};
  p2.blocks.splice(idx+1,0,nb);
  p2.updatedAt=new Date().toISOString();autoSave();renderMemo(p2);
}

let sCurR=-1,sCurC=-1;
function renderSheet(p){
  const s=p.sheet,a=document.getElementById('area');
  // 셀 통계 계산
  const vals=Object.values(s.data||{});
  const nums=vals.map(Number).filter(n=>!isNaN(n));
  const sum=nums.reduce((a,b)=>a+b,0);
  const avg=nums.length?(sum/nums.length).toFixed(2):0;
  const filled=vals.length;

  let h=`<div class="sheet">
    <div class="toolbar" style="flex-wrap:wrap">
      <button onclick="sAR()">+ 행</button><button onclick="sAC()">+ 열</button>
      <button onclick="sDR()">- 행</button><button onclick="sDC()">- 열</button>
      <span style="color:var(--border)">|</span>
      <button onclick="sInsRowAt()">↕ 행삽입</button><button onclick="sInsColAt()">↔ 열삽입</button>
      <span style="color:var(--border)">|</span>
      <button onclick="sSortCol('asc')">▲ 오름차순</button><button onclick="sSortCol('desc')">▼ 내림차순</button>
      <span style="color:var(--border)">|</span>
      <button onclick="sFindReplace()">🔍 찾기/바꾸기</button>
      <button onclick="sDuplRow()">📋 행복제</button>
      <button onclick="sDuplCol()">📋 열복제</button>
      <span style="color:var(--border)">|</span>
      <button onclick="sFreezeHeader()">📌 헤더고정</button>
      <button onclick="sAutoWidth()">↔ 자동너비</button>
      <span style="color:var(--border)">|</span>
      <button onclick="sClearAll()">🗑 비우기</button>
      <div style="display:flex;align-items:center;gap:4px;margin-left:auto">
      <button onclick="sCSV()">📥 CSV</button>
      <div id="sheetModeToggle" style="display:inline-flex;border-radius:6px;border:1px solid var(--border);overflow:hidden">
        <button onclick="setSheetMode('view')" class="smode" data-mode="view" style="padding:4px 10px;border:none;font-size:11px;cursor:pointer;font-weight:600;transition:all .12s">👁 보기</button>
        <button onclick="setSheetMode('gantt')" class="smode" data-mode="gantt" style="padding:4px 10px;border:none;border-left:1px solid var(--border);font-size:11px;cursor:pointer;font-weight:600;transition:all .12s">📊 간트</button>
      </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0 6px;font-size:11px;flex-wrap:wrap">
      <span style="color:var(--accent);font-weight:600" id="cellRef">${s.rows}×${s.cols}</span>
      <span style="color:var(--dim)">${filled}셀</span>
      ${nums.length?`<span style="color:var(--dim)">합계:${sum}</span><span style="color:var(--dim)">평균:${avg}</span><span style="color:var(--dim)">최소:${Math.min(...nums)}</span><span style="color:var(--dim)">최대:${Math.max(...nums)}</span>`:''}
      <span id="cellFormula" style="color:var(--text);margin-left:auto;font-family:Consolas,monospace;font-size:11px"></span>
    </div>
    <div id="sheetScroll" style="overflow:auto;max-height:calc(100vh - 240px)"><table class="stbl"><tr><th class="rh"></th>`;
  for(let c=0;c<s.cols;c++){const w=s.colWidths[c]||110;const cn=(s.colNames&&s.colNames[c])||colLbl(c);
    h+=`<th style="width:${w}px" oncontextmenu="event.preventDefault();sDelColAt(${c})"><input class="col-name" value="${esc(cn)}" onfocus="this.select()" onblur="sCN(${c},this.value)" onclick="event.stopPropagation()"><div class="rsz" onmousedown="sRsz(event,${c})"></div></th>`}
  h+='</tr>';
  for(let r=0;r<s.rows;r++){h+=`<tr><th class="rh" style="cursor:pointer" onclick="sDelRowAt(${r})" title="${r+1}행 삭제">${r+1}</th>`;
    for(let c=0;c<s.cols;c++){h+=`<td><input value="${esc(s.data[`${r},${c}`]||'')}" data-r="${r}" data-c="${c}" onfocus="sCellFocus(this,${r},${c})" onblur="this.parentElement.classList.remove('sel');sS(${r},${c},this.value)" onkeydown="sNav(event,${r},${c})" oncopy="sCellCopy(event,${r},${c})" onpaste="sCellPaste(event,${r},${c})"></td>`}h+='</tr>'}
  h+='</table></div></div>';a.innerHTML=h;

function colLbl(c){let l='';while(c>=0){l=String.fromCharCode(65+(c%26))+l;c=Math.floor(c/26)-1}return l}
function sS(r,c,v){
  const p=pg(),s=p.sheet,k=`${r},${c}`;
  if(v.trim()){
    // 수식이면 계산
    if(v.startsWith('=')){const calc=sCalcFormula(v,s);s.data[k]=calc;}
    else s.data[k]=v;
  }else delete s.data[k];
  p.updatedAt=new Date().toISOString();autoSave();
}
function sCN(c,v){
  const p=pg();if(!p.sheet.colNames)p.sheet.colNames=[];
  p.sheet.colNames[c]=v;
  // 열 이름 길이에 맞게 자동 너비 조절 (최소 110, 글자당 12px)
  const autoW=Math.max(110,v.length*12+30);
  if(autoW>(p.sheet.colWidths[c]||110))p.sheet.colWidths[c]=autoW;
  p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);
}
function sCellFocus(input,r,c){
  input.parentElement.classList.add('sel');input.select();
  sCurR=r;sCurC=c;
  const ref=document.getElementById('cellRef');
  if(ref)ref.textContent=colLbl(c)+(r+1)+' ('+pg().sheet.rows+'×'+pg().sheet.cols+')';
  // 수식 표시
  const formula=document.getElementById('cellFormula');
  if(formula)formula.textContent=input.value?'= '+input.value:'';
}

function sNav(e,r,c){
  const s=pg().sheet;let nr=r,nc=c;
  if(e.key==='Tab'){e.preventDefault();nc=e.shiftKey?c-1:c+1}
  else if(e.key==='Enter'){e.preventDefault();nr=e.shiftKey?r-1:r+1}
  else if(e.key==='ArrowDown'&&(e.ctrlKey||e.target.selectionStart===e.target.value.length)){nr=r+1}
  else if(e.key==='ArrowUp'&&(e.ctrlKey||e.target.selectionStart===0)){nr=r-1}
  else if(e.key==='ArrowRight'&&e.ctrlKey){nc=c+1}
  else if(e.key==='ArrowLeft'&&e.ctrlKey){nc=c-1}
  else if(e.key==='Delete'){e.target.value='';sS(r,c,'');return}
  else if(e.altKey&&e.key==='ArrowUp'){e.preventDefault();sMoveRow('up');return}
  else if(e.altKey&&e.key==='ArrowDown'){e.preventDefault();sMoveRow('down');return}
  else if(e.altKey&&e.key==='ArrowLeft'){e.preventDefault();sMoveCol('left');return}
  else if(e.altKey&&e.key==='ArrowRight'){e.preventDefault();sMoveCol('right');return}
  else return;
  if(nr<0||nc<0||nr>=s.rows||nc>=s.cols)return;
  const cell=document.querySelector('.stbl').rows[nr+1]?.cells[nc+1]?.querySelector('input');
  if(cell){cell.focus();cell.scrollIntoView({block:'nearest',behavior:'smooth'})}
}

// 셀 복사 (탭 구분)
function sCellCopy(e,r,c){
  // 전체 셀이 선택된 상태면 현재 행 복사
  if(e.target.selectionStart===0&&e.target.selectionEnd===e.target.value.length){
    e.preventDefault();
    const s=pg().sheet;let row=[];
    for(let i=0;i<s.cols;i++)row.push(s.data[`${r},${i}`]||'');
    const text=row.join('\t');
    if(window.nexus)window.nexus.copyText(text);else if(navigator.clipboard)navigator.clipboard.writeText(text).catch(()=>{});
    else navigator.clipboard.writeText(text);
  }
}

// 셀 붙여넣기 (엑셀에서 복사한 탭/줄바꿈 데이터 지원)
function sCellPaste(e,r,c){
  e.preventDefault();
  let text='';
  if(window.nexus)text=window.nexus.pasteText();
  else{e.clipboardData&&(text=e.clipboardData.getData('text'))}
  if(!text)return;
  const p=pg(),s=p.sheet;
  const rows=text.split(/\r?\n/).filter(x=>x);
  if(rows.length===1&&!rows[0].includes('\t')){
    // 단일 값 붙여넣기
    e.target.value=text.trim();sS(r,c,text.trim());return;
  }
  // 다중 셀 붙여넣기 (엑셀 → Nexus)
  rows.forEach((row,ri)=>{
    const cols=row.split('\t');
    cols.forEach((val,ci)=>{
      const tr=r+ri,tc=c+ci;
      if(tr<s.rows&&tc<s.cols){
        if(val.trim())s.data[`${tr},${tc}`]=val;else delete s.data[`${tr},${tc}`];
      }
    });
  });
  p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);
  toast(rows.length+'행 붙여넣기 완료');
}

// 행 삽입 (현재 선택 위치에)
function sInsRowAt(){
  if(sCurR<0){toast('셀을 먼저 선택하세요');return}
  const p=pg(),s=p.sheet,row=sCurR;
  const nd={};
  for(let r=0;r<s.rows;r++){
    const nr=r>=row?r+1:r;
    for(let c=0;c<s.cols;c++){const v=s.data[`${r},${c}`];if(v)nd[`${nr},${c}`]=v}
  }
  s.data=nd;s.rows++;p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast((row+1)+'행 위에 삽입');
}

// 열 삽입 (현재 선택 위치에)
function sInsColAt(){
  if(sCurC<0){toast('셀을 먼저 선택하세요');return}
  const p=pg(),s=p.sheet,col=sCurC;
  const nd={};
  for(let r=0;r<s.rows;r++){
    for(let c=0;c<s.cols;c++){
      const nc=c>=col?c+1:c;
      const v=s.data[`${r},${c}`];if(v)nd[`${r},${nc}`]=v;
    }
  }
  s.data=nd;s.cols++;
  if(s.colNames)s.colNames.splice(col,0,'');
  p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast(colLbl(col)+'열 앞에 삽입');
}

// 열 정렬
function sSortCol(dir){
  if(sCurC<0){toast('정렬할 열의 셀을 선택하세요');return}
  const p=pg(),s=p.sheet,col=sCurC;
  let rowData=[];
  for(let r=0;r<s.rows;r++){
    let row={};let has=false;
    for(let c=0;c<s.cols;c++){const v=s.data[`${r},${c}`]||'';row[c]=v;if(v)has=true}
    if(has)rowData.push(row);else rowData.push(row); // 빈 행도 유지
  }
  rowData.sort((a,b)=>{
    const va=a[col]||'',vb=b[col]||'';
    if(!va&&!vb)return 0;if(!va)return 1;if(!vb)return -1;
    const na=parseFloat(va),nb=parseFloat(vb);
    if(!isNaN(na)&&!isNaN(nb))return dir==='asc'?na-nb:nb-na;
    return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
  });
  s.data={};
  rowData.forEach((row,r)=>{for(let c=0;c<s.cols;c++){if(row[c])s.data[`${r},${c}`]=row[c]}});
  p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast(colLbl(col)+'열 '+(dir==='asc'?'오름차순':'내림차순')+' 정렬');
}

// 행 복제
function sDuplRow(){
  if(sCurR<0){toast('셀을 먼저 선택하세요');return}
  const p=pg(),s=p.sheet,row=sCurR;
  const nd={};
  for(let r=s.rows-1;r>=0;r--){
    const nr=r>row?r+1:r;
    for(let c=0;c<s.cols;c++){const v=s.data[`${r},${c}`];if(v)nd[`${nr},${c}`]=v}
  }
  for(let c=0;c<s.cols;c++){const v=s.data[`${row},${c}`];if(v)nd[`${row+1},${c}`]=v}
  s.data=nd;s.rows++;p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast((row+1)+'행 복제');
}

// 열 복제
function sDuplCol(){
  if(sCurC<0){toast('셀을 먼저 선택하세요');return}
  const p=pg(),s=p.sheet,col=sCurC;
  const nd={};
  for(let r=0;r<s.rows;r++){
    for(let c=s.cols-1;c>=0;c--){
      const nc=c>col?c+1:c;
      const v=s.data[`${r},${c}`];if(v)nd[`${r},${nc}`]=v;
    }
    const v=s.data[`${r},${col}`];if(v)nd[`${r},${col+1}`]=v;
  }
  s.data=nd;s.cols++;
  if(s.colNames){const nm=s.colNames[col]||'';s.colNames.splice(col+1,0,nm+'(복사)');}
  p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast(colLbl(col)+'열 복제');
}

// 자동 열 너비 (내용에 맞게)
function sAutoWidth(){
  const p=pg(),s=p.sheet;
  for(let c=0;c<s.cols;c++){
    let maxLen=(s.colNames&&s.colNames[c]||colLbl(c)).length;
    for(let r=0;r<s.rows;r++){const v=s.data[`${r},${c}`]||'';if(v.length>maxLen)maxLen=v.length}
    s.colWidths[c]=Math.max(80,Math.min(maxLen*10+30,400));
  }
  p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast('자동 너비 조절 완료');
}

// 헤더 고정
function sFreezeHeader(){
  const scroll=document.getElementById('sheetScroll');
  const th=document.querySelector('.stbl tr:first-child');
  if(!th)return;
  const frozen=th.style.position==='sticky';
  th.querySelectorAll('th').forEach(t=>{
    t.style.position=frozen?'':'sticky';
    t.style.top=frozen?'':'0';
    t.style.zIndex=frozen?'':'10';
  });
  toast(frozen?'헤더 고정 해제':'헤더 고정');
}

// 찾기/바꾸기 (모달로)
function sFindReplace(){
  const f=document.getElementById('evtForm');
  f.innerHTML=`<h3>🔍 찾기/바꾸기</h3>
    <label>찾을 내용</label><input id="sFind" placeholder="검색어">
    <label>바꿀 내용 (비워두면 찾기만)</label><input id="sReplace" placeholder="바꿀 텍스트">
    <div class="modal-acts">
      <button onclick="doFindReplace(false)">찾기</button>
      <button class="pri" onclick="doFindReplace(true)">전체 바꾸기</button>
      <button onclick="closeEvM()">닫기</button>
    </div>`;
  document.getElementById('evtModal').classList.add('show');
  setTimeout(()=>document.getElementById('sFind').focus(),80);
}
function doFindReplace(replace){
  const find=document.getElementById('sFind').value;if(!find)return;
  const rep=document.getElementById('sReplace').value;
  const p=pg(),s=p.sheet;let count=0;
  for(const k in s.data){
    if(s.data[k].includes(find)){
      count++;
      if(replace&&rep!=='')s.data[k]=s.data[k].replaceAll(find,rep);
    }
  }
  if(replace&&rep!==''){p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast(count+'개 바꿈')}
  else toast(count+'개 찾음');
}

// 셀 값에 간단 수식 지원 (=SUM, =AVG, =COUNT, =MAX, =MIN)
function sCalcFormula(val,s){
  if(!val||!val.startsWith('='))return val;
  const formula=val.toUpperCase().trim();
  const nums=Object.values(s.data||{}).map(Number).filter(n=>!isNaN(n));
  const colNums=(col)=>{
    const r=[];for(let i=0;i<s.rows;i++){const v=parseFloat(s.data[`${i},${col}`]);if(!isNaN(v))r.push(v)}return r;
  };
  // =SUM(열번호) 또는 =SUM(전체)
  const colMatch=formula.match(/\((\d+)\)/);
  const targetNums=colMatch?colNums(parseInt(colMatch[1])):nums;

  if(formula.startsWith('=SUM'))return targetNums.reduce((a,b)=>a+b,0).toString();
  if(formula.startsWith('=AVG')||formula.startsWith('=AVERAGE'))return targetNums.length?(targetNums.reduce((a,b)=>a+b,0)/targetNums.length).toFixed(2):'0';
  if(formula.startsWith('=COUNT'))return targetNums.length.toString();
  if(formula.startsWith('=MAX'))return targetNums.length?Math.max(...targetNums).toString():'0';
  if(formula.startsWith('=MIN'))return targetNums.length?Math.min(...targetNums).toString():'0';
  return val;
}

// 행/열 이동 (위/아래, 좌/우)
function sMoveRow(dir){
  if(sCurR<0)return;
  const p=pg(),s=p.sheet;
  const from=sCurR,to=dir==='up'?from-1:from+1;
  if(to<0||to>=s.rows)return;
  // 두 행 데이터 교환
  for(let c=0;c<s.cols;c++){
    const fk=`${from},${c}`,tk=`${to},${c}`;
    const fv=s.data[fk],tv=s.data[tk];
    if(fv)s.data[tk]=fv;else delete s.data[tk];
    if(tv)s.data[fk]=tv;else delete s.data[fk];
  }
  sCurR=to;p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);
}

function sMoveCol(dir){
  if(sCurC<0)return;
  const p=pg(),s=p.sheet;
  const from=sCurC,to=dir==='left'?from-1:from+1;
  if(to<0||to>=s.cols)return;
  for(let r=0;r<s.rows;r++){
    const fk=`${r},${from}`,tk=`${r},${to}`;
    const fv=s.data[fk],tv=s.data[tk];
    if(fv)s.data[tk]=fv;else delete s.data[tk];
    if(tv)s.data[fk]=tv;else delete s.data[fk];
  }
  // 열 이름도 교환
  if(s.colNames){const tmp=s.colNames[from];s.colNames[from]=s.colNames[to];s.colNames[to]=tmp}
  if(s.colWidths){const tmp=s.colWidths[from];s.colWidths[from]=s.colWidths[to];s.colWidths[to]=tmp}
  sCurC=to;p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);
}
function sAR(){const p=pg();p.sheet.rows++;p.updatedAt=new Date().toISOString();autoSave();renderSheet(p)}
function sAC(){const p=pg();p.sheet.cols++;if(!p.sheet.colNames)p.sheet.colNames=[];p.sheet.colNames.push('');p.updatedAt=new Date().toISOString();autoSave();renderSheet(p)}
function sDR(){const p=pg();if(p.sheet.rows<=1)return;const r=p.sheet.rows-1;for(let c=0;c<p.sheet.cols;c++)delete p.sheet.data[`${r},${c}`];p.sheet.rows--;p.updatedAt=new Date().toISOString();autoSave();renderSheet(p)}
function sDC(){const p=pg();if(p.sheet.cols<=1)return;const c=p.sheet.cols-1;for(let r=0;r<p.sheet.rows;r++)delete p.sheet.data[`${r},${c}`];p.sheet.cols--;if(p.sheet.colNames)p.sheet.colNames.pop();p.updatedAt=new Date().toISOString();autoSave();renderSheet(p)}

function sDelRowAt(row){
  const p=pg(),s=p.sheet;if(s.rows<=1)return;
  if(!confirm((row+1)+'행을 삭제할까요?'))return;
  const nd={};
  for(let r=0;r<s.rows;r++){
    if(r===row)continue;
    const nr=r>row?r-1:r;
    for(let c=0;c<s.cols;c++){const v=s.data[`${r},${c}`];if(v)nd[`${nr},${c}`]=v;}
  }
  s.data=nd;s.rows--;p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast((row+1)+'행 삭제');
}

function sDelColAt(col){
  const p=pg(),s=p.sheet;if(s.cols<=1)return;
  if(!confirm(colLbl(col)+'열을 삭제할까요?'))return;
  const nd={};
  for(let r=0;r<s.rows;r++){
    let nc=0;
    for(let c=0;c<s.cols;c++){
      if(c===col)continue;
      const v=s.data[`${r},${c}`];if(v)nd[`${r},${nc}`]=v;
      nc++;
    }
  }
  s.data=nd;s.cols--;
  if(s.colNames)s.colNames.splice(col,1);
  p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast(colLbl(col)+'열 삭제');
}

function sClearAll(){
  const p=pg();if(!confirm('모든 셀 데이터를 비울까요?'))return;
  p.sheet.data={};p.updatedAt=new Date().toISOString();autoSave();renderSheet(p);toast('전체 비우기 완료');
}
let rsC=-1,rsX=0,rsW=0;
function sRsz(e,c){e.preventDefault();rsC=c;rsX=e.clientX;rsW=pg().sheet.colWidths[c]||110;document.addEventListener('mousemove',sRM);document.addEventListener('mouseup',sRE)}
function sRM(e){const w=Math.max(50,rsW+(e.clientX-rsX));const ths=document.querySelectorAll('.stbl th');if(ths[rsC+1])ths[rsC+1].style.width=w+'px'}
function sRE(e){pg().sheet.colWidths[rsC]=Math.max(50,rsW+(e.clientX-rsX));autoSave();document.removeEventListener('mousemove',sRM);document.removeEventListener('mouseup',sRE)}
function sCSV(){const p=pg(),s=p.sheet;let csv='';if(s.colNames)csv+=s.colNames.map(n=>csvQ(n||'')).join(',')+'\n';for(let r=0;r<s.rows;r++){let row=[];for(let c=0;c<s.cols;c++)row.push(csvQ(s.data[`${r},${c}`]||''));csv+=row.join(',')+'\n'}dl(csv,(p.title||'sheet')+'.csv','text/csv');toast('CSV 저장')}

let sheetViewMode=false;
let curSheetMode='edit'; // edit | view | gantt
function setSheetMode(mode){
  curSheetMode=mode;
  ganttMode=mode==='gantt'||mode==='combo';
  sheetViewMode=mode==='view'||mode==='combo';
  const p=pg();if(!p||p.type!=='sheet')return;
  if(mode==='gantt')renderGantt(p);
  else if(mode==='view')renderSheetView(p);
  else if(mode==='combo')renderComboView(p);
  else renderSheet(p);
  // 토글 버튼 상태 업데이트
  setTimeout(()=>{
    document.querySelectorAll('.smode').forEach(b=>{
      b.classList.toggle('active',b.dataset.mode===mode);
    });
  },50);
}
function toggleSheetView(){setSheetMode(sheetViewMode?'edit':'view')}

function renderSheetView(p){
  const s=p.sheet,a=document.getElementById('area');
  if(!s||!s.data){a.innerHTML='<p>시트 데이터 없음</p>';return}

  const cn=s.colNames||[];
  // WBS 감지
  let wbsCol=-1,taskCol=-1,startCol=-1,endCol=-1,progCol=-1;
  cn.forEach((n,i)=>{
    const nl=n.replace(/\s/g,'').toLowerCase();
    if(nl==='wbs'||nl.includes('번호'))wbsCol=i;
    if(nl.includes('작업명')||nl.includes('task'))taskCol=i;
    if(nl.includes('시작일'))startCol=i;
    if(nl.includes('종료일'))endCol=i;
    if(nl.includes('진척'))progCol=i;
  });

  let h=`<div style="padding:0 0 20px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      ${modeToggleWrap('view')}
      <span style="font-size:11px;color:var(--dim)">${s.rows}행 × ${s.cols}열</span>
      <button onclick="sCSV()" style="margin-left:auto;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-size:11px">📥 CSV</button>
    </div>
    <div style="overflow:auto;border:1px solid var(--border);border-radius:8px;background:var(--card)">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:var(--bg);position:sticky;top:0;z-index:1">`;

  // 헤더
  for(let c=0;c<s.cols;c++){
    const name=cn[c]||String.fromCharCode(65+c);
    h+=`<th style="padding:10px 12px;text-align:left;font-weight:700;font-size:11px;color:var(--dim);border-bottom:2px solid var(--border);white-space:nowrap">${esc(name)}</th>`;
  }
  h+=`</tr></thead><tbody>`;

  // 데이터 행
  for(let r=0;r<s.rows;r++){
    let hasData=false;
    for(let c=0;c<s.cols;c++){if(s.data[`${r},${c}`]){hasData=true;break}}
    if(!hasData)continue;

    // WBS depth 감지
    const wbs=wbsCol>=0?(s.data[`${r},${wbsCol}`]||''):'';
    const depth=wbs?wbs.split('.').length:0;
    const isSection=depth<=3&&wbs;
    const taskName=taskCol>=0?(s.data[`${r},${taskCol}`]||''):'';
    const prog=progCol>=0?parseInt((s.data[`${r},${progCol}`]||'0').replace('%',''))||0:null;

    // 행 스타일
    let rowStyle='border-bottom:1px solid var(--border);';
    if(isSection&&depth<=2)rowStyle+='background:var(--bg);font-weight:700;font-size:13px;';
    else if(isSection)rowStyle+='background:rgba(255,255,255,.02);font-weight:600;';

    h+=`<tr style="${rowStyle}">`;
    for(let c=0;c<s.cols;c++){
      const v=s.data[`${r},${c}`]||'';
      let cellStyle='padding:8px 12px;';

      // 진행률 셀 → 비주얼 바
      if(c===progCol&&prog!==null){
        const progColor=prog>=100?'#4ade80':prog>=50?'#fbbf24':prog>0?'#fb923c':'#555';
        h+=`<td style="${cellStyle}">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:50px;height:6px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden">
              <div style="height:100%;width:${prog}%;background:${progColor};border-radius:3px"></div>
            </div>
            <span style="color:${progColor};font-weight:600;font-size:11px">${prog}%</span>
          </div>
        </td>`;
      }
      // 작업명 셀 → 들여쓰기
      else if(c===taskCol){
        const indent=Math.max(0,depth-2)*16;
        h+=`<td style="${cellStyle}padding-left:${12+indent}px;${isSection?'':'color:var(--text)'}">${esc(v.trim())}</td>`;
      }
      // 날짜 셀
      else if((c===startCol||c===endCol)&&v){
        const d=v.slice(5); // MM-DD
        h+=`<td style="${cellStyle}color:var(--dim);font-size:11px;white-space:nowrap">${esc(d)}</td>`;
      }
      else{
        h+=`<td style="${cellStyle}${!v?'':''}">${esc(v)}</td>`;
      }
    }
    h+=`</tr>`;
  }

  h+=`</tbody></table></div></div>`;
  a.innerHTML=h;
}

function renderComboView(p){
  const s=p.sheet,a=document.getElementById('area');
  if(!s||!s.data){a.innerHTML='<p>데이터 없음</p>';return}

  const cn=s.colNames||[];
  let wbsCol=-1,taskCol=-1,startCol=-1,endCol=-1,progCol=-1,noteCol=-1;
  cn.forEach((n,i)=>{
    const nl=n.replace(/\s/g,'').toLowerCase();
    if(nl==='wbs'||nl.includes('번호'))wbsCol=i;
    if(nl.includes('작업명')||nl.includes('task'))taskCol=i;
    if(nl.includes('시작일'))startCol=i;
    if(nl.includes('종료일'))endCol=i;
    if(nl.includes('진척'))progCol=i;
    if(nl.includes('비고'))noteCol=i;
  });
  if(taskCol===-1)taskCol=1;if(wbsCol===-1)wbsCol=0;

  // 작업 파싱
  const parseLocal=str=>{const p=str.split('-');return new Date(+p[0],+p[1]-1,+p[2]||1)};
  const tasks=[];let minDate=Infinity,maxDate=-Infinity;
  for(let r=0;r<s.rows;r++){
    const name=(s.data[`${r},${taskCol}`]||'').trim();
    const startStr=s.data[`${r},${startCol}`]||'';
    if(!name||!startStr)continue;
    const start=parseLocal(startStr);
    const endStr=s.data[`${r},${endCol}`]||startStr;
    const end=parseLocal(endStr);
    if(isNaN(start.getTime()))continue;
    const wbs=s.data[`${r},${wbsCol}`]||'';
    const depth=wbs?wbs.split('.').length:1;
    let prog=0;
    if(progCol!==-1){prog=parseInt((s.data[`${r},${progCol}`]||'0').replace('%',''))||0}
    const note=noteCol!==-1?(s.data[`${r},${noteCol}`]||''):'';
    tasks.push({wbs,name,start,end,prog,depth,note,row:r});
    if(start<minDate)minDate=start;
    if(end>maxDate)maxDate=end;
  }
  if(!tasks.length){a.innerHTML='<p style="padding:40px;text-align:center;color:var(--dim)">날짜가 있는 작업이 없습니다.</p>';return}

  // 섹션 판별 + 진행률 집계
  tasks.forEach(t=>{t.isSection=tasks.some(t2=>t2.wbs!==t.wbs&&t2.wbs.startsWith(t.wbs+'.'))});
  [...tasks].sort((a,b)=>b.depth-a.depth).forEach(t=>{
    if(!t.isSection)return;
    const ch=tasks.filter(t2=>t2.wbs!==t.wbs&&t2.wbs.startsWith(t.wbs+'.')&&t2.depth===t.depth+1);
    if(ch.length)t.prog=Math.round(ch.reduce((s,c)=>s+c.prog,0)/ch.length);
  });

  // 접기 적용
  const visible=tasks.filter(t=>{
    for(const cw of ganttCollapsed){if(t.wbs!==cw&&t.wbs.startsWith(cw+'.'))return false}
    return true;
  });

  // 날짜 범위
  const msDay=86400000;
  const startD=new Date(minDate);startD.setHours(0,0,0,0);startD.setDate(startD.getDate()-((startD.getDay()+6)%7));
  const endD=new Date(maxDate);endD.setHours(0,0,0,0);endD.setDate(endD.getDate()+(7-endD.getDay())%7);
  const totalDays=Math.round((endD-startD)/msDay)+1;
  const today=new Date();today.setHours(0,0,0,0);
  const dayW=24;const chartW=totalDays*dayW;

  // 주 목록
  const weeks=[];let wd=new Date(startD);
  while(wd<=endD){const we=new Date(wd);we.setDate(we.getDate()+6);weeks.push({start:new Date(wd),end:we>endD?new Date(endD):we});wd.setDate(wd.getDate()+7)}

  const totalProg=tasks.length?Math.round(tasks.reduce((s,t)=>s+t.prog,0)/tasks.length):0;
  const leftW=420;

  let h=`<div style="padding:0 0 20px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:600">📋 WBS + 📊 간트</span>
      <span style="font-size:11px;color:var(--dim)">${visible.length}/${tasks.length}개 작업</span>
      <span style="margin-left:auto;font-size:12px;font-weight:700;color:var(--accent)">전체 ${totalProg}%</span>
    </div>
    <div style="overflow:auto;border:1px solid var(--border);border-radius:8px;background:var(--card)">
    <div style="display:flex;min-width:${leftW+chartW}px">
      <!-- 왼쪽: 테이블 -->
      <div style="min-width:${leftW}px;max-width:${leftW}px;border-right:2px solid var(--border);flex-shrink:0">
        <div style="display:flex;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--dim);position:sticky;top:0;z-index:2">
          <span style="width:55px">WBS</span><span style="flex:1">작업명</span><span style="width:65px;text-align:center">기간</span><span style="width:70px;text-align:right">진행률</span>
        </div>`;

  visible.forEach(t=>{
    const indent=Math.max(0,t.depth-2)*16;
    const progColor=t.prog>=100?'#4ade80':t.prog>=50?'#fbbf24':t.prog>0?'#fb923c':'#555';
    const arrow=t.isSection?`<span onclick="event.stopPropagation();toggleGanttSection('${t.wbs}')" style="cursor:pointer;font-size:8px;width:12px;display:inline-block;text-align:center;flex-shrink:0;transform:rotate(${ganttCollapsed.has(t.wbs)?'0':'90'}deg)">▶</span>`:'<span style="width:12px;flex-shrink:0"></span>';
    const days=Math.ceil((t.end-t.start)/msDay)+1;
    const borderL=t.isSection?`border-left:3px solid ${progColor};`:'';
    const bg=t.isSection?(t.depth<=2?'background:var(--bg);':'background:rgba(255,255,255,.02);'):'';
    const fw=t.isSection?'font-weight:700;':'';
    const isDelayed=t.prog<100&&t.end<today;

    h+=`<div style="display:flex;align-items:center;padding:4px 8px;border-bottom:1px solid var(--border);font-size:11px;height:32px;${borderL}${bg}${fw}${isDelayed?'background:rgba(248,113,113,.05)':''}">
      <span style="width:55px;color:var(--dim);font-size:9px;flex-shrink:0">${esc(t.wbs)}</span>
      ${arrow}
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:${indent}px;font-size:${t.isSection?'11.5px':'11px'}" title="${esc(t.note)}">${isDelayed&&!t.isSection?'⚠️ ':''}${esc(t.name)}</span>
      <span style="width:65px;text-align:center;font-size:9px;color:var(--dim);flex-shrink:0">${days}일</span>
      <div style="width:70px;display:flex;align-items:center;gap:4px;flex-shrink:0;justify-content:flex-end">
        <div style="width:${t.isSection?36:30}px;height:${t.isSection?7:5}px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden">
          <div style="height:100%;width:${t.prog}%;background:${progColor};border-radius:3px"></div>
        </div>
        <span style="font-weight:${t.isSection?'800':'600'};color:${progColor};font-size:${t.isSection?'11px':'10px'};min-width:28px;text-align:right">${t.prog}%</span>
      </div>
    </div>`;
  });

  h+=`</div>
      <!-- 오른쪽: 간트 바 -->
      <div style="flex:1;overflow-x:auto;position:relative">
        <div style="min-width:${chartW}px;position:relative">
          <div style="display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2">`;

  weeks.forEach(w=>{
    const days=Math.ceil((w.end-w.start)/msDay)+1;
    const m=w.start.getMonth()+1,d=w.start.getDate();
    h+=`<div style="width:${days*dayW}px;flex-shrink:0;text-align:center;padding:8px 0;font-size:9px;color:var(--dim);border-right:1px solid var(--border)">${m}/${d}</div>`;
  });
  h+=`</div>`;

  // 바
  visible.forEach(t=>{
    const startOff=Math.max(0,Math.floor((t.start-startD)/msDay));
    const duration=Math.max(1,Math.ceil((t.end-t.start)/msDay)+1);
    const left=startOff*dayW;const width=duration*dayW;
    const progColor=t.prog>=100?'#4ade80':t.prog>=50?'#fbbf24':t.prog>0?'#fb923c':'#555';
    const barColor=t.isSection?'var(--accent)':progColor;
    const bgBar=t.isSection?'rgba(255,204,0,.12)':'rgba(167,139,250,.1)';
    const barH=t.isSection?8:14;const barTop=t.isSection?12:9;
    const barR=t.isSection?'2px':'7px';

    h+=`<div style="position:relative;height:32px;border-bottom:1px solid var(--border);${t.isSection?'background:var(--bg)':''}">
      <div style="position:absolute;top:${barTop}px;left:${left}px;width:${width}px;height:${barH}px;border-radius:${barR};background:${bgBar};border:1px solid ${barColor}80;overflow:hidden">
        <div style="height:100%;width:${t.prog}%;background:${barColor};opacity:.5;border-radius:inherit"></div>
      </div>
      ${!t.isSection&&width>40?`<span style="position:absolute;top:10px;left:${left+width+3}px;font-size:8px;color:${progColor};font-weight:600;pointer-events:none">${t.prog}%</span>`:''}
    </div>`;
  });

  // 오늘 라인
  const todayOff=Math.floor((today-startD)/msDay);
  if(todayOff>=0&&todayOff<=totalDays){
    h+=`<div style="position:absolute;top:0;bottom:0;left:${todayOff*dayW}px;width:2px;background:var(--danger);z-index:3;opacity:.6;pointer-events:none"></div>
    <div style="position:absolute;top:2px;left:${todayOff*dayW-10}px;background:var(--danger);color:#fff;font-size:8px;padding:1px 4px;border-radius:2px;z-index:4;pointer-events:none">오늘</div>`;
  }

  h+=`</div></div></div></div></div>`;
  a.innerHTML=h;
}

function modeToggleHtml(current){
  return ['edit','view','gantt'].map(m=>{
    const labels={edit:'✏️ 편집',view:'👁 보기',gantt:'📊 간트'};
    const active=m===current;
    const bl=m==='edit'?'':'border-left:1px solid var(--border);';
    return `<button onclick="setSheetMode('${m}')" style="padding:5px 12px;border:none;${bl}font-size:11px;cursor:pointer;font-weight:${active?'700':'400'};background:${active?'var(--accent)':'var(--card)'};color:${active?'#000':'var(--dim)'};transition:all .12s">${labels[m]}</button>`;
  }).join('');
}
function modeToggleWrap(current){
  return `<div style="display:inline-flex;border-radius:6px;border:1px solid var(--border);overflow:hidden">${modeToggleHtml(current)}</div>`;
}

let ganttMode=false;
let ganttFilter='all';
let ganttCollapsed=new Set(); // 접힌 WBS 번호
function setGanttFilter(f){ganttFilter=f;const p=pg();if(p)renderGantt(p)}
function toggleGanttSection(wbs){
  if(ganttCollapsed.has(wbs))ganttCollapsed.delete(wbs);else ganttCollapsed.add(wbs);
  const p=pg();if(p)renderGantt(p);
}
function toggleGantt(){setSheetMode(ganttMode?'edit':'gantt')}

function ganttProgCycle(el,row,progCol){
  if(progCol===-1)return;
  const p=pg();if(!p||!p.sheet)return;
  const cur=parseInt((p.sheet.data[`${row},${progCol}`]||'0').replace('%',''))||0;
  const next=cur<50?50:cur<100?100:0;
  p.sheet.data[`${row},${progCol}`]=next+'%';
  p.updatedAt=new Date().toISOString();autoSave();renderGantt(p);
}

function ganttProgEdit(el,row,progCol){
  if(progCol===-1||el.querySelector('input'))return;
  const p=pg();if(!p||!p.sheet)return;
  const cur=parseInt((p.sheet.data[`${row},${progCol}`]||'0').replace('%',''))||0;

  el.innerHTML=`<input type="range" min="0" max="100" step="5" value="${cur}"
    style="width:50px;height:6px;cursor:pointer;accent-color:var(--accent)"
    oninput="this.nextElementSibling.textContent=this.value+'%'"
    onchange="ganttProgSave(${row},${progCol},this.value)"
    onmousedown="event.stopPropagation()"
    onclick="event.stopPropagation()">
  <span style="font-weight:600;font-size:11px;min-width:30px;text-align:right">${cur}%</span>`;

  const slider=el.querySelector('input');
  slider.focus();
  slider.addEventListener('blur',()=>{
    setTimeout(()=>{if(!el.contains(document.activeElement))ganttProgSave(row,progCol,slider.value)},100);
  });
}

function ganttBarClick(e,bar,row,progCol,barW){
  if(progCol===-1)return;
  e.stopPropagation();
  const rect=bar.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const pct=Math.round(Math.max(0,Math.min(100,x/rect.width*100))/5)*5;
  ganttProgSave(row,progCol,pct);
}

function ganttProgSave(row,progCol,val){
  const p=pg();if(!p||!p.sheet)return;
  p.sheet.data[`${row},${progCol}`]=val+'%';
  p.updatedAt=new Date().toISOString();
  autoSave();
  renderGantt(p);
}

function renderGantt(p){
  const s=p.sheet,a=document.getElementById('area');
  if(!s||!s.data){a.innerHTML='<p>시트 데이터가 없습니다.</p>';return}

  // 컬럼 인덱스 자동 감지 (시작일, 종료일, 작업명, 진척률)
  const cn=s.colNames||[];
  let taskCol=-1,startCol=-1,endCol=-1,progCol=-1,wbsCol=-1;
  cn.forEach((n,i)=>{
    const nl=n.toLowerCase().replace(/\s/g,'');
    if(nl.includes('작업명')||nl.includes('task'))taskCol=i;
    if(nl.includes('시작일')||nl.includes('start'))startCol=i;
    if(nl.includes('종료일')||nl.includes('end')||nl.includes('완료일'))endCol=i;
    if(nl.includes('진척')||nl.includes('progress'))progCol=i;
    if(nl==='wbs'||nl.includes('번호'))wbsCol=i;
  });

  if(startCol===-1||endCol===-1){
    a.innerHTML=`<div style="padding:40px;text-align:center;color:var(--dim)">
      <p style="font-size:16px;margin-bottom:8px">📊 간트차트를 표시할 수 없습니다</p>
      <p>컬럼명에 <b>시작일</b>과 <b>종료일</b>이 포함되어야 합니다.</p>
      <button onclick="toggleGantt()" style="margin-top:12px;padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer">시트로 돌아가기</button>
    </div>`;return;
  }
  if(taskCol===-1)taskCol=1;
  if(wbsCol===-1)wbsCol=0;

  // 데이터 파싱
  const tasks=[];
  let minDate=Infinity,maxDate=-Infinity;
  for(let r=0;r<s.rows;r++){
    const name=(s.data[`${r},${taskCol}`]||'').trim();
    const startStr=s.data[`${r},${startCol}`]||'';
    const endStr=s.data[`${r},${endCol}`]||'';
    if(!name||!startStr)continue;
    // YYYY-MM-DD를 로컬 시간으로 파싱 (UTC 오프셋 방지)
    const parseLocal=s=>{const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]||1)};
    const start=parseLocal(startStr),end=parseLocal(endStr||startStr);
    if(isNaN(start.getTime()))continue;
    const wbs=s.data[`${r},${wbsCol}`]||'';
    let prog=0;
    if(progCol!==-1){const pv=s.data[`${r},${progCol}`]||'0';prog=parseInt(pv.replace('%',''))||0;}
    const indent=(name.length-name.trimStart().length)/2;
    const depth=wbs?wbs.split('.').length:indent+1;
    tasks.push({wbs,name:name.trim(),start,end:isNaN(end.getTime())?start:end,prog,indent,depth,row:r});
    if(start<minDate)minDate=start;
    if(end>maxDate)maxDate=end;
  }

  if(!tasks.length){
    a.innerHTML=`<div style="padding:40px;text-align:center;color:var(--dim)"><p>날짜가 있는 작업이 없습니다.</p>
    <button onclick="toggleGantt()" style="margin-top:12px;padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer">시트로 돌아가기</button></div>`;return;
  }

  // 섹션 판별 + 하위 진행률 자동 집계
  tasks.forEach(t=>{
    t.isSection=tasks.some(t2=>t2.wbs!==t.wbs&&t2.wbs.startsWith(t.wbs+'.'));
    t.isCollapsed=ganttCollapsed.has(t.wbs);
  });
  // 섹션 진행률 = 직계 하위 작업들의 평균 (깊은 것부터 계산)
  const byDepth=[...tasks].sort((a,b)=>b.depth-a.depth);
  byDepth.forEach(t=>{
    if(!t.isSection)return;
    const children=tasks.filter(t2=>t2.wbs!==t.wbs&&t2.wbs.startsWith(t.wbs+'.')&&t2.depth===t.depth+1);
    if(children.length){
      t.prog=Math.round(children.reduce((s,c)=>s+c.prog,0)/children.length);
    }
  });

  // 필터 적용
  const todayF=new Date();todayF.setHours(0,0,0,0);
  const visibleTasks=tasks.filter(t=>{
    // 접힌 섹션의 하위 항목 숨기기
    for(const cw of ganttCollapsed){
      if(t.wbs!==cw&&t.wbs.startsWith(cw+'.'))return false;
    }
    // 필터
    if(ganttFilter==='notdone')return t.prog<100;
    if(ganttFilter==='active')return t.prog>0&&t.prog<100;
    if(ganttFilter==='delayed')return t.prog<100&&t.end<todayF;
    return true;
  });

  // 날짜 범위 (주 단위로 확장, 로컬 날짜 기준)
  const msDay=86400000;
  const toLocal=d=>{const nd=new Date(d);nd.setHours(0,0,0,0);return nd};
  const startD=toLocal(minDate);startD.setDate(startD.getDate()-((startD.getDay()+6)%7)); // 월요일 시작
  const endD=toLocal(maxDate);endD.setDate(endD.getDate()+(7-endD.getDay())%7); // 일요일 끝
  const totalDays=Math.round((endD-startD)/msDay)+1;
  const today=new Date();today.setHours(0,0,0,0);

  // 주(week) 목록 생성
  const weeks=[];
  let wd=new Date(startD);
  while(wd<=endD){const we=new Date(wd);we.setDate(we.getDate()+6);weeks.push({start:new Date(wd),end:we>endD?new Date(endD):we});wd.setDate(wd.getDate()+7)}

  const dayW=28;const chartW=totalDays*dayW;

  // 전체 진척률 계산
  const totalProg=tasks.length?Math.round(tasks.reduce((s,t)=>s+t.prog,0)/tasks.length):0;

  let h=`<div style="padding:0 0 20px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
      ${modeToggleWrap('gantt')}
      <span style="font-size:11px;color:var(--dim)">${visibleTasks.length}/${tasks.length}개 작업 · ${startD.toLocaleDateString('ko-KR')}~${endD.toLocaleDateString('ko-KR')}</span>
      <span style="margin-left:auto;font-size:12px;font-weight:600;color:var(--accent)">전체 진행률: ${totalProg}%</span>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap">
      ${[['all','전체'],['notdone','미완료'],['active','진행중'],['delayed','지연']].map(([k,l])=>
        `<button onclick="setGanttFilter('${k}')" style="padding:4px 10px;border-radius:5px;border:1px solid ${ganttFilter===k?'var(--accent)':'var(--border)'};background:${ganttFilter===k?'var(--accent)':'var(--card)'};color:${ganttFilter===k?'#000':'var(--text)'};cursor:pointer;font-size:11px;font-weight:${ganttFilter===k?'700':'400'};transition:all .12s">${l}</button>`
      ).join('')}
    </div>
    <div style="overflow:auto;border:1px solid var(--border);border-radius:8px;background:var(--card)">
    <div style="display:flex;min-width:${360+chartW}px">
      <!-- 작업 목록 -->
      <div style="min-width:360px;max-width:360px;border-right:2px solid var(--border);flex-shrink:0">
        <div style="display:flex;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--dim);position:sticky;top:0;z-index:2">
          <span style="width:60px">WBS</span><span style="flex:1">작업명</span><span style="width:50px;text-align:right">진행률</span>
        </div>`;

  visibleTasks.forEach(t=>{
    const depthIndent=Math.max(0,t.depth-2)*20;
    const isDelayed=t.prog<100&&t.end<todayF;
    const progColor=t.prog>=100?'#4ade80':t.prog>=50?'#fbbf24':t.prog>0?'#fb923c':'#555';
    // 접기 화살표
    const arrow=t.isSection?`<span onclick="event.stopPropagation();toggleGanttSection('${t.wbs}')" style="cursor:pointer;font-size:9px;width:14px;display:inline-block;text-align:center;flex-shrink:0;transition:transform .15s;transform:rotate(${t.isCollapsed?'0':'90'}deg)">▶</span>`:'<span style="width:14px;flex-shrink:0"></span>';

    if(t.isSection){
      // ── 섹션 행: 진행률 게이지 배경 + 큰 프로그레스 바 ──
      const bgGrad=`linear-gradient(90deg, ${progColor}15 ${t.prog}%, transparent ${t.prog}%)`;
      const rowH=t.depth<=2?36:32;
      const fontSize=t.depth<=2?'13px':'12px';
      const borderL=t.depth<=2?`border-left:3px solid ${progColor};`:`border-left:2px solid ${progColor}55;`;

      h+=`<div style="display:flex;align-items:center;padding:4px 10px;border-bottom:1px solid var(--border);font-size:${fontSize};height:${rowH}px;position:relative;background-image:${bgGrad};font-weight:700;${borderL}" data-gantt-row="${t.row}">
        <span style="width:55px;color:var(--dim);font-size:10px;flex-shrink:0">${esc(t.wbs)}</span>
        ${arrow}
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:${depthIndent}px">${esc(t.name)}</span>
        <div style="width:120px;display:flex;align-items:center;gap:6px;flex-shrink:0;justify-content:flex-end">
          <div style="width:60px;height:8px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;flex-shrink:0">
            <div style="height:100%;width:${t.prog}%;background:${progColor};border-radius:4px;transition:width .3s"></div>
          </div>
          <span style="font-weight:800;color:${progColor};font-size:12px;min-width:36px;text-align:right">${t.prog}%</span>
        </div>
      </div>`;
    }else{
      // ── 세부 작업 행 ──
      const delayBg=isDelayed?'background:rgba(248,113,113,.06);':'';
      const vertLine=t.depth>3?`<span style="position:absolute;left:${60+(t.depth-4)*20+6}px;top:0;bottom:0;width:1px;background:var(--border);opacity:.3"></span>`:'';

      h+=`<div style="display:flex;align-items:center;padding:4px 10px;border-bottom:1px solid var(--border);font-size:11px;height:30px;position:relative;${delayBg}" data-gantt-row="${t.row}">
        ${vertLine}
        <span style="width:55px;color:var(--dim);font-size:10px;flex-shrink:0">${esc(t.wbs)}</span>
        ${arrow}
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:${depthIndent}px">${isDelayed?'⚠️ ':''}${esc(t.name)}</span>
        <div class="gantt-prog" style="width:120px;display:flex;align-items:center;gap:6px;flex-shrink:0;justify-content:flex-end${t.isSection?'':';cursor:pointer'}" ${t.isSection?'':`onclick="ganttProgCycle(this,${t.row},${progCol})"`}>
          <div style="width:50px;height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;flex-shrink:0">
            <div style="height:100%;width:${t.prog}%;background:${progColor};border-radius:3px;transition:width .3s"></div>
          </div>
          <span style="font-weight:600;color:${progColor};font-size:11px;min-width:36px;text-align:right">${t.prog}%</span>
        </div>
      </div>`;
    }
  });

  h+=`</div>
      <!-- 차트 영역 -->
      <div style="flex:1;overflow-x:auto;position:relative">
        <div style="min-width:${chartW}px;position:relative">
          <!-- 주 헤더 -->
          <div style="display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2">`;

  weeks.forEach(w=>{
    const days=Math.ceil((w.end-w.start)/msDay)+1;
    const m=w.start.getMonth()+1,d=w.start.getDate();
    h+=`<div style="width:${days*dayW}px;flex-shrink:0;text-align:center;padding:8px 0;font-size:10px;color:var(--dim);border-right:1px solid var(--border)">${m}/${d}</div>`;
  });
  h+=`</div>`;

  // 오늘 위치
  const todayOffset=Math.floor((today-startD)/msDay);

  // 작업 바
  visibleTasks.forEach(t=>{
    const startOff=Math.max(0,Math.floor((t.start-startD)/msDay));
    const duration=Math.max(1,Math.ceil((t.end-t.start)/msDay)+1);
    const left=startOff*dayW;const width=duration*dayW;
    const barColor=t.isSection?'var(--accent)':t.prog>=100?'var(--success)':'var(--purple)';
    const bgBar=t.isSection?'rgba(255,204,0,.15)':'rgba(167,139,250,.12)';
    const barH=t.isSection?8:16;const barTop=t.isSection?11:7;
    const barRadius=t.isSection?'2px':'9px';
    const progColor=t.prog>=100?'var(--success)':t.prog>=50?'var(--accent)':t.prog>0?'var(--warn)':'var(--dim)';

    h+=`<div style="position:relative;height:30px;border-bottom:1px solid var(--border);${t.isSection?'background:var(--bg)':''}">
      <div class="gantt-bar" style="position:absolute;top:${barTop}px;left:${left}px;width:${width}px;height:${barH}px;border-radius:${barRadius};background:${bgBar};border:1px solid ${barColor};overflow:hidden" title="${esc(t.name)} ${t.prog}%">
        <div style="height:100%;width:${t.prog}%;background:${barColor};opacity:.6;border-radius:inherit;pointer-events:none"></div>
      </div>
      ${!t.isSection&&width>50?`<span style="position:absolute;top:8px;left:${left+width+4}px;font-size:9px;color:${progColor};font-weight:600;pointer-events:none">${t.prog}%</span>`:''}
    </div>`;
  });

  // 오늘 라인 (차트 영역 내부, position:relative 기준)
  if(todayOffset>=0&&todayOffset<=totalDays){
    const todayLeft=todayOffset*dayW;
    h+=`<div style="position:absolute;top:0;bottom:0;left:${todayLeft}px;width:2px;background:var(--danger);z-index:3;opacity:.7;pointer-events:none"></div>
    <div style="position:absolute;top:2px;left:${todayLeft-14}px;background:var(--danger);color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;z-index:4;pointer-events:none">오늘</div>`;
  }

  h+=`</div></div></div></div></div>`;
  a.innerHTML=h;
}

// ══════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════
function renderCal(p){
  const now=new Date();if(!calY){calY=now.getFullYear();calM=now.getMonth()}
  const a=document.getElementById('area');
  let h=`<div class="cal"><div class="cal-nav"><button onclick="calP()">◀</button><span class="month-lbl">${calY}년 ${calM+1}월</span><button onclick="calN()">▶</button><button onclick="calT()" style="margin-left:6px">오늘</button><button onclick="openEvM()" style="margin-left:auto">+ 일정</button></div><div class="cal-grid">`;
  ['일','월','화','수','목','금','토'].forEach((d,i)=>h+=`<div class="dh ${i===0?'sun':i===6?'sat':''}">${d}</div>`);
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0),sd=first.getDay();
  const ts=dF(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  const totalCells=42; // 항상 6줄
  const pl=new Date(calY,calM,0);
  // 이전 달
  for(let i=sd-1;i>=0;i--){const d=pl.getDate()-i;const dt=dF(calY,calM-1,d);const dow=(sd-1-i)%7;h+=`<div class="cal-cell other ${dow===0?'sun':dow===6?'sat':''}" onclick="openEvM('${dt}')"><div class="dn">${d}</div>${eFor(p,dt)}</div>`}
  // 현재 달
  for(let d=1;d<=last.getDate();d++){const dt=dF(calY,calM,d),dow=new Date(calY,calM,d).getDay();h+=`<div class="cal-cell ${dt===ts?'today':''} ${dow===0?'sun':dow===6?'sat':''}" onclick="openEvM('${dt}')"><div class="dn">${d}</div>${eFor(p,dt)}</div>`}
  // 다음 달 (42칸 채우기)
  const filled=sd+last.getDate();for(let i=1;i<=totalCells-filled;i++){const dt=dF(calY,calM+1,i);const dow=(filled+i-1)%7;h+=`<div class="cal-cell other ${dow===0?'sun':dow===6?'sat':''}" onclick="openEvM('${dt}')"><div class="dn">${i}</div>${eFor(p,dt)}</div>`}
  h+='</div>';

  // Event list below calendar
  const monthEvts=[...(p.events||[])].filter(e=>{
    const ed=new Date(e.date);return ed.getFullYear()===calY&&ed.getMonth()===calM;
  }).sort((a,b)=>a.date.localeCompare(b.date));

  const allEvts=[...(p.events||[])].sort((a,b)=>a.date.localeCompare(b.date));
  const listEvts=monthEvts.length?monthEvts:allEvts.slice(0,10);
  const listTitle=monthEvts.length?`${calM+1}월 일정 (${monthEvts.length}건)`:`전체 일정 (${allEvts.length}건)`;

  if(listEvts.length){
    h+=`<div class="ev-list"><div class="ev-list-hdr">📋 ${listTitle}</div>`;
    listEvts.forEach(e=>{
      h+=`<div class="ev-list-item" onclick="editEv('${e.id}')">
        <div class="ev-dot ${e.priority||'default'}"></div>
        <span class="ev-date">${e.date}</span>
        <span class="ev-title">${esc(e.title)}</span>
        <span class="ev-note">${esc(e.note||'')}</span>
        <button class="ev-edit" onclick="event.stopPropagation();editEv('${e.id}')">수정</button>
      </div>`;
    });
    h+=`</div>`;
  }

  h+='</div>';a.innerHTML=h;
}
function dF(y,m,d){const dt=new Date(y,m,d);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`}
function eFor(p,dt){const evts=(p.events||[]).filter(e=>{const start=e.date;const end=e.endDate||e.date;return dt>=start&&dt<=end});const maxShow=2;let html=evts.slice(0,maxShow).map(e=>`<div class="ev ${e.priority||'default'}" onclick="event.stopPropagation();editEv('${e.id}')" title="클릭하여 수정"><span>${esc(e.title)}</span><span class="ev-btn" onclick="event.stopPropagation();editEv('${e.id}')">✏</span></div>`).join('');if(evts.length>maxShow)html+=`<div class="ev default" style="text-align:center;font-weight:600;opacity:.8;cursor:pointer" onclick="event.stopPropagation()">+${evts.length-maxShow}개</div>`;return html}
function calP(){calM--;if(calM<0){calM=11;calY--}if(view==='cal')renderGlobalCal();else renderCal(pg())}
function calN(){calM++;if(calM>11){calM=0;calY++}if(view==='cal')renderGlobalCal();else renderCal(pg())}
function calT(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();if(view==='cal')renderGlobalCal();else renderCal(pg())}

// ══════════════════════════════════════════
// GLOBAL CALENDAR (통합 캘린더)
// ══════════════════════════════════════════
function getGlobalEvents(){
  if(!D.globalEvents)D.globalEvents=[];
  return D.globalEvents;
}

function renderGlobalCal(){
  const now=new Date();if(!calY){calY=now.getFullYear();calM=now.getMonth()}
  const a=document.getElementById('area');
  const allEvts=getGlobalEvents();
  let h=`<div class="cal"><div class="cal-nav"><button onclick="calP()">◀</button><span class="month-lbl">${calY}년 ${calM+1}월</span><button onclick="calN()">▶</button><button onclick="calT()" style="margin-left:6px">오늘</button><button onclick="createDailyTodo()" style="margin-left:auto;background:var(--purple);border-color:var(--purple);color:#fff">📋 오늘 할 일</button><button onclick="openGEvM()">+ 일정</button></div><div class="cal-grid">`;
  ['일','월','화','수','목','금','토'].forEach((d,i)=>h+=`<div class="dh ${i===0?'sun':i===6?'sat':''}">${d}</div>`);
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0),sd=first.getDay();
  const ts=dF(now.getFullYear(),now.getMonth(),now.getDate());
  const totalCells=42;const pl=new Date(calY,calM,0);
  function gEvHtml(dt){const evts=allEvts.filter(e=>{
    const start=e.date;const end=e.endDate||e.date;
    return dt>=start&&dt<=end;
  });const maxShow=2;let html=evts.slice(0,maxShow).map(e=>{
    const c=evtColor(e.color);
    const time=e.startTime?`<span style="font-size:9px;opacity:.7">${e.startTime}</span> `:'';
    return`<div class="ev" style="background:${c}22;color:${c};border-left:2px solid ${c}" onclick="event.stopPropagation();editGEv('${e.id}')">${time}<span>${esc(e.title)}</span></div>`;
  }).join('');if(evts.length>maxShow)html+=`<div class="ev" style="text-align:center;font-weight:600;opacity:.8;background:rgba(255,255,255,0.05);color:var(--dim);cursor:pointer" onclick="event.stopPropagation()">+${evts.length-maxShow}개</div>`;return html}
  // 이전 달
  for(let i=sd-1;i>=0;i--){const d=pl.getDate()-i;const dt=dF(calY,calM-1,d);const dow=(sd-1-i)%7;h+=`<div class="cal-cell other ${dow===0?'sun':dow===6?'sat':''}" onclick="openGEvM('${dt}')"><div class="dn">${d}</div>${gEvHtml(dt)}</div>`}
  // 현재 달
  for(let d=1;d<=last.getDate();d++){
    const dt=dF(calY,calM,d),dow=new Date(calY,calM,d).getDay();
    h+=`<div class="cal-cell ${dt===ts?'today':''} ${dow===0?'sun':dow===6?'sat':''}" onclick="openGEvM('${dt}')" oncontextmenu="event.preventDefault();createDailyTodo('${dt}')"><div class="dn">${d}</div>${gEvHtml(dt)}</div>`;
  }
  // 다음 달 (42칸 채우기)
  const filled=sd+last.getDate();for(let i=1;i<=totalCells-filled;i++){const dt=dF(calY,calM+1,i);const dow=(filled+i-1)%7;h+=`<div class="cal-cell other ${dow===0?'sun':dow===6?'sat':''}" onclick="openGEvM('${dt}')"><div class="dn">${i}</div>${gEvHtml(dt)}</div>`}
  h+='</div>';

  // Event list — 이번 주만 표시
  const todayDate=new Date();
  const todayStr=dF(todayDate.getFullYear(),todayDate.getMonth(),todayDate.getDate());
  const dayOfWeek=todayDate.getDay();
  const weekStart=new Date(todayDate);weekStart.setDate(todayDate.getDate()-dayOfWeek);
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
  const wsStr=dF(weekStart.getFullYear(),weekStart.getMonth(),weekStart.getDate());
  const weStr=dF(weekEnd.getFullYear(),weekEnd.getMonth(),weekEnd.getDate());

  const weekEvts=allEvts.filter(e=>e.date>=wsStr&&e.date<=weStr).sort((a,b)=>a.date.localeCompare(b.date));
  const upcomingEvts=allEvts.filter(e=>e.date>weStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);

  if(weekEvts.length){
    h+=`<div class="ev-list"><div class="ev-list-hdr">📋 이번 주 일정 (${wsStr} ~ ${weStr}) — ${weekEvts.length}건</div>`;
    weekEvts.forEach(e=>{
      const c=evtColor(e.color);const time=e.startTime?e.startTime+'~'+(e.endTime||''):'하루종일';
      const past=e.date<todayStr?'opacity:.5;':'';
      h+=`<div class="ev-list-item" style="${past}" onclick="editGEv('${e.id}')"><div class="ev-dot" style="background:${c}"></div><span class="ev-date">${e.date}</span><span style="font-size:10px;color:var(--dim);min-width:65px">${time}</span><span class="ev-title">${esc(e.title)}</span><span class="ev-note">${esc(e.note||'')}</span><button class="ev-edit" onclick="event.stopPropagation();editGEv('${e.id}')">수정</button></div>`;
    });
    h+=`</div>`;
  }
  if(upcomingEvts.length){
    h+=`<div class="ev-list" style="margin-top:8px"><div class="ev-list-hdr">📅 다가오는 일정</div>`;
    upcomingEvts.forEach(e=>{
      const c=evtColor(e.color);const time=e.startTime?e.startTime+'~'+(e.endTime||''):'하루종일';
      h+=`<div class="ev-list-item" onclick="editGEv('${e.id}')"><div class="ev-dot" style="background:${c}"></div><span class="ev-date">${e.date}</span><span style="font-size:10px;color:var(--dim);min-width:65px">${time}</span><span class="ev-title">${esc(e.title)}</span><span class="ev-note">${esc(e.note||'')}</span><button class="ev-edit" onclick="event.stopPropagation();editGEv('${e.id}')">수정</button></div>`;
    });
    h+=`</div>`;
  }
  h+='</div>';a.innerHTML=h;
}

  {id:'pink',label:'기타',c:'#f472b6'},{id:'cyan',label:'면접',c:'#22d3ee'},{id:'gray',label:'완료',c:'#71717a'}

function evtColor(id){return (EVT_COLORS.find(x=>x.id===id)||EVT_COLORS[0]).c}

function timeOptions(selected){
  const times=[];
  for(let h=0;h<24;h++){for(let m=0;m<60;m+=30){
    const t=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
    const label=t;
    times.push(`<option value="${t}" ${t===selected?'selected':''}>${label}</option>`);
  }}
  return times.join('');
}

function openGEvM(date){
  _evAttendees=[];
  const f=document.getElementById('evtForm');
  f.innerHTML=evtFormHtml({date:date||dF(calY,calM,new Date().getDate())});
  document.getElementById('evtModal').classList.add('show');
  setTimeout(()=>{document.getElementById('evT').focus();updGcalBadge();const loc=document.getElementById('evLoc');if(loc)checkMeetingRoom(loc.value)},80);
}

function editGEv(eid){
  if(!D.globalEvents)D.globalEvents=[];
  let ev=D.globalEvents.find(e=>e.id===eid);if(!ev)return;
  _evAttendees=[...(ev.attendees||[])];
  document.getElementById('evtForm').innerHTML=evtFormHtml(ev);
  document.getElementById('evtModal').classList.add('show');
  setTimeout(updGcalBadge,80);
}

// ── Google Calendar 연동 ──
async function gcalConnect(){
  if(!window.nexus?.gcalAuth){toast('앱 재시작 필요');return}
  toast('Google 로그인 페이지를 여는 중...');
  const res=await window.nexus.gcalAuth();
  if(res.success){toast('✅ Google 캘린더 연결 완료!');updGcalBadge()}
  else toast('연결 실패: '+(res.error||''));
}
async function updGcalBadge(){
  const badge=document.getElementById('gcalStatusBadge');
  const btn=document.getElementById('gcalConnBtn');
  if(!badge||!btn)return;
  if(!window.nexus?.gcalStatus){badge.textContent='';btn.textContent='연결';return}
  const s=await window.nexus.gcalStatus();
  if(s.connected){
    badge.textContent='🟢 연결됨';badge.style.color='var(--success)';
    btn.textContent='해제';btn.onclick=async()=>{await window.nexus.gcalLogout();toast('연결 해제');updGcalBadge()};
  }else{
    badge.textContent='⚪ 미연결';badge.style.color='var(--dim)';
    btn.textContent='연결';btn.onclick=gcalConnect;
  }
}

async function gcalSyncEvent(ev){
  if(!window.nexus?.gcalAddEvent)return;
  const s=await window.nexus.gcalStatus();
  if(!s.connected){toast('Google 캘린더 미연결. 연결 버튼을 눌러주세요.');return}
  const res=await window.nexus.gcalAddEvent(ev);
  if(res.success){
    // Google 이벤트 ID 저장 (다음에 수정/삭제 시 사용)
    const ge=(D.globalEvents||[]).find(e=>e.id===ev.id);
    if(ge){ge.gcalEventId=res.id;save()}
    toast(ev.gcalEventId?'📅 Google 캘린더 수정됨':'📅 Google 캘린더에 추가됨');
  }else toast('Google 동기화 실패: '+(res.error||''));
}

async function gcalDeleteEvent(gcalEventId){
  if(!gcalEventId||!window.nexus?.gcalDeleteEvent)return;
  const s=await window.nexus.gcalStatus();
  if(!s.connected)return;
  await window.nexus.gcalDeleteEvent(gcalEventId);
}

function showLocSuggest(q){

// 참석자 관리 + 자동완성
let _evAttendees=[];
function getKnownContacts(){
  // 과거 일정에서 참석자 수집
  const set=new Set();
  (D.globalEvents||[]).forEach(e=>{(e.attendees||[]).forEach(a=>set.add(a))});
  return [...set];
}
function addAttendee(){
  const inp=document.getElementById('evAtt');if(!inp)return;
  const name=inp.value.trim();if(!name)return;
  if(!_evAttendees.includes(name))_evAttendees.push(name);
  inp.value='';
  hideContactSuggest();
  renderAttendeeList();
}
function showContactSuggest(q){
  let box=document.getElementById('contactSuggest');
  if(!box){box=document.createElement('div');box.id='contactSuggest';box.style.cssText='position:absolute;left:0;right:60px;background:var(--card);border:1px solid var(--border);border-radius:6px;max-height:120px;overflow-y:auto;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.3)';
  document.getElementById('evAtt').parentElement.style.position='relative';document.getElementById('evAtt').parentElement.appendChild(box)}
  const contacts=getKnownContacts().filter(c=>(!q||c.toLowerCase().includes(q.toLowerCase()))&&!_evAttendees.includes(c));
  if(!contacts.length){box.style.display='none';return}
  box.style.display='block';
  box.innerHTML=contacts.map(c=>{
    const isEmail=c.includes('@');
    return `<div onclick="_selectContact('${esc(c)}')" style="padding:6px 10px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:5px;transition:background .1s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">${isEmail?'✉️':'👤'} ${esc(c)}</div>`;
  }).join('');
}
function _selectContact(c){
  if(!_evAttendees.includes(c))_evAttendees.push(c);
  document.getElementById('evAtt').value='';
  hideContactSuggest();
  renderAttendeeList();
}
function hideContactSuggest(){const b=document.getElementById('contactSuggest');if(b)b.style.display='none'}
function removeAttendee(idx){
  _evAttendees.splice(idx,1);
  renderAttendeeList();
}
function renderAttendeeList(){
  const el=document.getElementById('attendeeList');if(!el)return;
  el.innerHTML=_evAttendees.map((a,i)=>{
    const isEmail=a.includes('@');

function addDaysToDateStr(dateStr,days){
  const parts=(dateStr||'').split('-').map(Number);
  if(parts.length!==3||parts.some(n=>!Number.isFinite(n)))return dateStr||'';
  const dt=new Date(parts[0],parts[1]-1,parts[2]);
  dt.setDate(dt.getDate()+days);
  return dF(dt.getFullYear(),dt.getMonth(),dt.getDate());
}

function extractDailySectionTodos(page,sectionText,opts={}){
  if(!page||!Array.isArray(page.blocks))return[];
  const start=page.blocks.findIndex(b=>b.type==='h2'&&(b.content||'').includes(sectionText));
  if(start<0)return[];
  const items=[];
  for(let i=start+1;i<page.blocks.length;i++){
    const b=page.blocks[i];
    if(b.type==='h2'||b.type==='divider')break;
    if(b.type==='todo'&&(b.content||'').trim()&&(!opts.unfinishedOnly||!b.done))items.push(b.content.trim());
  }
  return items;
}

function mergeUniqueTexts(...groups){
  const seen=new Set(),out=[];
  groups.flat().forEach(v=>{
    const text=(v||'').trim();
    if(!text||seen.has(text))return;
    seen.add(text);out.push(text);
  });
  return out;
}

function ensureDailyTodoItems(page,items){
  if(!page||!Array.isArray(page.blocks)||!items.length)return false;
  const start=page.blocks.findIndex(b=>b.type==='h2'&&(b.content||'').includes('할 일')&&!(b.content||'').includes('내일'));
  if(start<0)return false;
  let end=page.blocks.findIndex((b,i)=>i>start&&(b.type==='h2'||b.type==='divider'));
  if(end<0)end=page.blocks.length;
  const existing=new Set(page.blocks.slice(start+1,end).filter(b=>b.type==='todo').map(b=>(b.content||'').trim()).filter(Boolean));
  const add=items.filter(item=>!existing.has(item));
  if(!add.length)return false;
  page.blocks.splice(end,0,...add.map(content=>({id:gid(),type:'todo',content,done:false})));
  page.updatedAt=new Date().toISOString();
  return true;
}

function ensureDailyTomorrowSection(page){
  if(!page||page.icon!=='📋'||!Array.isArray(page.blocks))return false;
  const hasTomorrow=page.blocks.some(b=>b.type==='h2'&&(b.content||'').includes('내일 할 것'));
  if(hasTomorrow)return false;
  let insertAt=page.blocks.findIndex(b=>b.type==='h2'&&(b.content||'').includes('오늘 한 일'));
  if(insertAt<0)insertAt=page.blocks.findIndex(b=>b.type==='h2'&&(b.content||'').includes('오늘 배운 점'));
  if(insertAt<0)insertAt=page.blocks.length;
  page.blocks.splice(insertAt,0,
    {id:gid(),type:'h2',content:'➡️ 내일 할 것'},
    {id:gid(),type:'todo',content:'',done:false},
    {id:gid(),type:'divider',content:''}
  );
  page.updatedAt=new Date().toISOString();
  return true;
}

function createDailyTodo(dateStr){
  const now=dateStr?new Date(dateStr+'T00:00:00'):new Date();
  const today=dF(now.getFullYear(),now.getMonth(),now.getDate());
  const prevDate=addDaysToDateStr(today,-1);
  const weekdays=['일','월','화','수','목','금','토'];
  const dayName=weekdays[now.getDay()];
  const title=`${today} (${dayName})`;

  // 이미 이날 데일리가 있으면 그 페이지로 이동
  const existing=D.pages.find(p=>p.title===title&&p.icon==='📋');
  if(existing){
    // carry는 최초 1회만 실행 (이미 carry 완료된 페이지에 중복 추가 방지)
    if(!existing.carryDone){
      const prevDaily=D.pages.find(p=>p.icon==='📋'&&p.title&&p.title.startsWith(prevDate));
      const carry=mergeUniqueTexts(
        extractDailySectionTodos(prevDaily,'할 일',{unfinishedOnly:true}),
        extractDailySectionTodos(prevDaily,'내일 할 것')
      );
      const addedTomorrowSection=ensureDailyTomorrowSection(existing);
      const addedCarryItems=ensureDailyTodoItems(existing,carry);
      existing.carryDone=true;
      if(addedTomorrowSection||addedCarryItems)autoSave();
    }
    openPg(existing.id);return
  }

  // 해당 날짜 일정 가져오기
  const dayEvts=getGlobalEvents().filter(e=>e.date===today).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));
  const prevDaily=D.pages.find(p=>p.icon==='📋'&&p.title&&p.title.startsWith(prevDate));
  const tomorrowCarry=mergeUniqueTexts(
    extractDailySectionTodos(prevDaily,'할 일',{unfinishedOnly:true}),
    extractDailySectionTodos(prevDaily,'내일 할 것')
  );

  const blocks=[
    {id:gid(),type:'h1',content:`📋 ${today} (${dayName})`},
    {id:gid(),type:'text',content:`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${dayName}요일`},
    {id:gid(),type:'divider',content:''},
  ];

  // 오늘 일정
  blocks.push({id:gid(),type:'h2',content:'📅 일정'});
  if(dayEvts.length){
    dayEvts.forEach(e=>{
      const time=e.startTime?`${e.startTime}~${e.endTime||''}`:'하루종일';
      const color=EVT_COLORS.find(c=>c.id===e.color);
      const label=color?color.label:'';
      blocks.push({id:gid(),type:'todo',content:`[${time}] ${e.title}${label?' ('+label+')':''}`,done:false});
      if(e.note){
        e.note.split('\n').forEach(line=>{
          if(line.trim())blocks.push({id:gid(),type:'bullet',content:line.trim()});
        });
      }
    });
  }else{
    blocks.push({id:gid(),type:'text',content:'일정 없음'});
  }
  blocks.push({id:gid(),type:'divider',content:''});

  // 할 일
  blocks.push({id:gid(),type:'h2',content:'✅ 할 일'});
  if(tomorrowCarry.length)tomorrowCarry.forEach(content=>blocks.push({id:gid(),type:'todo',content,done:false}));
  else blocks.push({id:gid(),type:'todo',content:'',done:false});
  blocks.push({id:gid(),type:'divider',content:''});

  // 내일 할 것
  blocks.push({id:gid(),type:'h2',content:'➡️ 내일 할 것'});
  blocks.push({id:gid(),type:'todo',content:'',done:false});
  blocks.push({id:gid(),type:'divider',content:''});

  // 오늘 한 일
  blocks.push({id:gid(),type:'h2',content:'🏆 오늘 한 일'});
  blocks.push({id:gid(),type:'bullet',content:''});
  blocks.push({id:gid(),type:'divider',content:''});

  // 오늘 배운 점
  blocks.push({id:gid(),type:'h2',content:'💡 오늘 배운 점'});
  blocks.push({id:gid(),type:'bullet',content:''});
  blocks.push({id:gid(),type:'divider',content:''});

  // 메모/회고
  blocks.push({id:gid(),type:'h2',content:'📝 메모 / 회고'});
  blocks.push({id:gid(),type:'text',content:''});

  const page={
    id:gid(),title,type:'memo',icon:'📋',
    createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
    blocks
  };

  D.pages.unshift(page);

  // "일기장" 폴더 자동 생성 및 추가
  if(!D.folders)D.folders=[];
  let diary=D.folders.find(f=>f.name==='일기장');
  if(!diary){
    diary={id:gid(),name:'일기장',pageIds:[],collapsed:false};
    D.folders.unshift(diary);
  }
  diary.pageIds.unshift(page.id);

  autoSave();renderList();openPg(page.id);
  toast(`${today} 데일리 생성`);
}
