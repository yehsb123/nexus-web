function handleAllFiles(files){
  if(!files||!files.length)return;
  Array.from(files).forEach(f=>{
    const name=f.name||'';
    const ext=name.split('.').pop().toLowerCase();

    if(ext==='json'||f.type==='application/json'){
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const d=JSON.parse(ev.target.result);
          if(d.pages){
            D=d;lastSnap=JSON.stringify(D);undoStack=[];redoStack=[];save();curId=null;
            closeFileImport();goHome();
            toast('불러오기 완료 ('+d.pages.length+'개 페이지)');
          }else if(d.id&&d.type){
            D.pages.unshift(d);autoSave();renderList();
            closeFileImport();
            toast((d.title||'페이지')+' 추가됨');
          }else{
            toast('유효하지 않은 JSON 형식');
          }
        }catch(err){toast('JSON 파싱 오류: '+err.message)}
      };
      reader.readAsText(f);

    }else if(ext==='pdf'||f.type==='application/pdf'){
      if(!window.pdfjsLib){toast('PDF 라이브러리 로딩중... 잠시 후 다시 시도해주세요');return}
      const reader=new FileReader();
      reader.onload=async ev=>{
        try{
          toast('PDF 텍스트 추출 중...');
          const pdf=await pdfjsLib.getDocument(new Uint8Array(ev.target.result)).promise;
          let fullText='';
          for(let i=1;i<=pdf.numPages;i++){
            const pg=await pdf.getPage(i);
            const tc=await pg.getTextContent();
            fullText+='\n\n--- 페이지 '+i+' ---\n\n'+tc.items.map(x=>x.str).join(' ');
          }
          document.getElementById('pdfExtractArea').style.display='block';
          document.getElementById('pdfExtractText').value=fullText.trim();
          document.getElementById('pdfPageTitle').value=name.replace(/\.pdf$/i,'');
          toast('PDF '+pdf.numPages+'페이지 추출 완료');
        }catch(err){toast('PDF 읽기 실패: '+err.message)}
      };
      reader.readAsArrayBuffer(f);

    }else if(ext==='xlsx'||ext==='xls'||ext==='csv'){
      // 엑셀/CSV 파일 → Nexus 시트로 변환
      if(!window.XLSX){toast('엑셀 라이브러리 로딩 중... 잠시 후 다시 시도');return}
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
          wb.SheetNames.forEach((sn,si)=>{
            const ws=wb.Sheets[sn];
            const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
            if(!data.length){toast(sn+': 빈 시트');return}
            const rows=data.length-1;
            const cols=Math.min(data.reduce((mx,r)=>Math.max(mx,r.length),0),26);
            const colNames=[];
            for(let ci=0;ci<cols;ci++)colNames.push(String(data[0][ci]||''));
            const sheetData={};
            for(let r=1;r<data.length;r++){
              for(let ci=0;ci<cols;ci++){
                const v=data[r]?String(data[r][ci]||''):'';
                if(v)sheetData[r-1+','+ci]=v;
              }
            }
            const title=name.replace(/\.[^.]+$/,'')+(wb.SheetNames.length>1?' ('+sn+')':'');
            const now=new Date().toISOString();
            const page={
              id:gid(),title,type:'sheet',icon:'📊',
              createdAt:now,updatedAt:now,
              sheet:{cols,rows:Math.max(rows,10),colWidths:{},colNames,data:sheetData}
            };
            D.pages.unshift(page);
            toast(title+' ('+rows+'행×'+cols+'열) 가져옴');
          });
          autoSave();renderList();closeFileImport();
        }catch(err){toast('엑셀 읽기 실패: '+err.message)}
      };
      reader.readAsArrayBuffer(f);

    }else if(ext==='html'||ext==='htm'){
      // HTML 파일 → 뷰어로 보기
      const reader=new FileReader();
      reader.onload=ev=>{
        closeFileImport();
        openHtmlViewer(name,ev.target.result);
      };
      reader.readAsText(f);

    }else{
      // MD, TXT, 기타 텍스트 파일 전부 처리
      const reader=new FileReader();
      reader.onload=ev=>{
        const title=name.replace(/\.[^.]+$/,'')||'가져온 문서';
        const content=ev.target.result;
        D.pages.unshift(mdToPage(title,content));
        autoSave();renderList();closeFileImport();
        toast(title+' 가져옴');
      };
      reader.readAsText(f);
    }
  });
}

function mdToPage(title,md){
  const now=new Date().toISOString();
  const blocks=[];
  const lines=md.split('\n');
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    if(line.match(/^### /))blocks.push({id:gid(),type:'h3',content:line.slice(4)});
    else if(line.match(/^## /))blocks.push({id:gid(),type:'h2',content:line.slice(3)});
    else if(line.match(/^# /))blocks.push({id:gid(),type:'h1',content:line.slice(2)});
    else if(line.match(/^---$/))blocks.push({id:gid(),type:'divider',content:''});
    else if(line.match(/^> /))blocks.push({id:gid(),type:'quote',content:line.slice(2)});
    else if(line.match(/^- \[x\] /i))blocks.push({id:gid(),type:'todo',content:line.slice(6),done:true});
    else if(line.match(/^- \[ \] /))blocks.push({id:gid(),type:'todo',content:line.slice(6),done:false});
    else if(line.match(/^[-*] /))blocks.push({id:gid(),type:'bullet',content:line.slice(2)});
    else if(line.match(/^```/)){
      let code='';i++;while(i<lines.length&&!lines[i].match(/^```/)){code+=(code?'\n':'')+lines[i];i++}
      blocks.push({id:gid(),type:'code',content:code});
    }
    else if(line.trim())blocks.push({id:gid(),type:'text',content:line});
  }
  if(!blocks.length)blocks.push({id:gid(),type:'text',content:''});
  return{id:gid(),title,type:'memo',icon:'📄',createdAt:now,updatedAt:now,blocks};
}

function buildPdfHtml(page,theme,author){
  const T={
    purple:{pri:'#4a2c82',grad:'linear-gradient(135deg,#4a2c82 0%,#7c5cbf 50%,#9b7dd4 100%)',acc:'#4a2c82'},
    blue:{pri:'#1e3a5f',grad:'linear-gradient(135deg,#1e3a5f 0%,#3a7bd5 50%,#5b9bd5 100%)',acc:'#1e3a5f'},
    dark:{pri:'#1a1a2e',grad:'linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)',acc:'#0f3460'},
    minimal:{pri:'#2c3e50',grad:'linear-gradient(135deg,#2c3e50 0%,#4a6741 50%,#6b8f71 100%)',acc:'#2c3e50'}
  };
  const t=T[theme]||T.purple;
  const today=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  let body='';

  if(page.type==='memo'){
    let secs=[];let cur=null;
    (page.blocks||[]).forEach(b=>{
      if(b.type==='h1'||b.type==='h2'){if(cur)secs.push(cur);cur={title:b.content,level:b.type,items:[]};}
      else{if(!cur)cur={title:'',level:'',items:[]};cur.items.push(b);}
    });if(cur)secs.push(cur);
    secs.forEach(s=>{
      if(s.title){const fs=s.level==='h1'?'18px':'15px';
        body+=`<div class="doc-sec"><div class="sec-lbl" style="font-size:${fs}">${esc(s.title)}</div><div class="sec-body">${s.items.map(b=>bToDoc(b)).join('')}</div></div>`;
      }else body+=`<div class="doc-intro">${s.items.map(b=>bToDoc(b)).join('')}</div>`;
    });
  }else if(page.type==='sheet'&&page.sheet){
    const s=page.sheet;body+=`<table class="doc-tbl"><thead><tr>`;
    for(let c=0;c<s.cols;c++)body+=`<th>${esc((s.colNames&&s.colNames[c])||colLbl(c))}</th>`;
    body+=`</tr></thead><tbody>`;
    for(let r=0;r<s.rows;r++){let has=false;for(let c=0;c<s.cols;c++)if(s.data[`${r},${c}`])has=true;if(!has)continue;body+=`<tr>`;for(let c=0;c<s.cols;c++)body+=`<td>${esc(s.data[`${r},${c}`]||'')}</td>`;body+=`</tr>`}
    body+=`</tbody></table>`;
  }else if(page.type==='calendar'){
    const evts=[...(page.events||[])].sort((a,b)=>a.date.localeCompare(b.date));
    const pc={high:'#e74c3c',mid:'#f39c12',low:'#27ae60',default:'#3498db'};

  }

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>

function bToDoc(b){
  switch(b.type){
    case 'h3':return`<div class="bh3">${esc(b.content)}</div>`;
    case 'bullet':return`<div class="bb">${esc(b.content)}</div>`;
    case 'todo':return`<div class="bt ${b.done?'done':''}"><div class="ck"></div><span>${esc(b.content)}</span></div>`;
    case 'quote':return`<div class="bq">${esc(b.content)}</div>`;
    case 'code':return`<div class="bc">${esc(b.content)}</div>`;
    case 'callout':return`<div class="bco">${esc(b.content)}</div>`;
    case 'divider':return`<hr>`;
    case 'image':return b.content?`<img src="${b.content}" style="max-width:100%;border-radius:4px;margin:8px 0">`:'';
    case 'toggle':
      const children=(b.children||[]).map(c=>bToDoc(c)).join('');
      return`<div class="doc-toggle"><div class="doc-toggle-hdr">▶ ${esc(b.content)}</div><div class="doc-toggle-body">${children}</div></div>`;
    case 'columns':
      const cols=(b.cols||[]).map(col=>`<div class="doc-col">${col.map(c=>bToDoc(c)).join('')}</div>`).join('');
      return`<div class="doc-columns">${cols}</div>`;
    default:
      if(!b.content)return '';
      // 마크다운 테이블 감지 (| 로 시작하는 텍스트)
      if(b.content.includes('|')&&b.content.trim().startsWith('|')){
        const lines=b.content.split('\n').filter(l=>l.trim());
        if(lines.length>=2){
          let html='<table class="inline-tbl">';
          lines.forEach((line,i)=>{
            if(line.replace(/[|\-\s]/g,'').length===0)return;
            const cells=line.split('|').filter(c=>c.trim()!=='');
            const tag=i===0?'th':'td';
            html+=`<tr>${cells.map(c=>`<${tag}>${esc(c.trim())}</${tag}>`).join('')}</tr>`;
          });
          html+='</table>';
          return html;
        }
      }
      // 아스키 아트/박스 다이어그램 감지 (┌│└─ 등)
      if(b.content.match(/[┌┐└┘│─├┤┬┴┼╔╗╚╝║═]/)){
        return `<pre style="font-family:Consolas,'D2Coding',monospace;font-size:9.5px;line-height:1.4;background:#f4f4f5;padding:12px 14px;border-radius:4px;margin:8px 0;white-space:pre;overflow-x:auto;page-break-inside:avoid">${esc(b.content)}</pre>`;
      }
      return `<p>${esc(b.content)}</p>`;
  }
}

function loadFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.pages){D=d;lastSnap=JSON.stringify(D);undoStack=[];redoStack=[];save();curId=null;goHome();toast(`불러오기 완료 (${d.pages.length}개)`)}else toast('유효하지 않은 JSON')}catch(err){toast('JSON 오류')}};r.readAsText(f);e.target.value=''}
function exportPageJSON(){const p=pg();if(!p)return;dl(JSON.stringify(p,null,2),(p.title||'page')+'.json','application/json');toast('JSON 저장')}
function exportPageMD(){const p=pg();if(!p)return;dl(pageToMD(p),(p.title||'page')+'.md','text/markdown');toast('MD 저장')}
function exportAllMD(){let md='# 성빈 보드\n\n> '+new Date().toLocaleString('ko-KR')+'\n\n---\n\n';D.pages.forEach(p=>{md+=pageToMD(p)+'\n\n---\n\n'});dl(md,'sungbin-board-all.md','text/markdown');toast('전체 MD 저장')}
function pageToMD(p){
  let md=`# ${p.icon||''} ${p.title||'제목 없음'}\n\n`;
  if(p.type==='memo'){(p.blocks||[]).forEach(b=>{switch(b.type){case 'h1':md+=`# ${b.content}\n\n`;break;case 'h2':md+=`## ${b.content}\n\n`;break;case 'h3':md+=`### ${b.content}\n\n`;break;case 'bullet':md+=`- ${b.content}\n`;break;case 'todo':md+=`- [${b.done?'x':' '}] ${b.content}\n`;break;case 'quote':md+=`> ${b.content}\n\n`;break;case 'code':md+=`\`\`\`\n${b.content}\n\`\`\`\n\n`;break;case 'callout':md+=`> 💡 ${b.content}\n\n`;break;case 'divider':md+=`---\n\n`;break;default:md+=`${b.content}\n\n`}});}
  else if(p.type==='sheet'&&p.sheet){const s=p.sheet;const h=(s.colNames||[]).map((n,i)=>n||colLbl(i));md+='| '+h.join(' | ')+' |\n| '+h.map(()=>'---').join(' | ')+' |\n';for(let r=0;r<s.rows;r++){let row=[],has=false;for(let c=0;c<s.cols;c++){const v=s.data[`${r},${c}`]||'';row.push(v);if(v)has=true}if(has)md+='| '+row.join(' | ')+' |\n'}md+='\n';}
  else if(p.type==='calendar'){(p.events||[]).sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{md+=`- ${{high:'🔴',mid:'🟡',low:'🟢',default:'🔵'}[e.priority||'default']} **${e.date}** — ${e.title}${e.note?' ('+e.note+')':''}\n`});md+='\n';}
  return md;
}
function dl(c,n,t){const b=new Blob([c],{type:t+';charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click();URL.revokeObjectURL(a.href)}

// Ctrl+스크롤 줌
let zoomLevel=parseFloat(localStorage.getItem('nexus_zoom')||'1');
function applyZoom(){
  if(window.nexus?.setZoom)window.nexus.setZoom(zoomLevel);
  else document.body.style.zoom=zoomLevel;
  localStorage.setItem('nexus_zoom',zoomLevel);
}
if(zoomLevel!==1)setTimeout(applyZoom,100);
document.addEventListener('wheel',e=>{
  if(!e.ctrlKey)return;
  e.preventDefault();
  zoomLevel+=(e.deltaY<0?0.05:-0.05);
  zoomLevel=Math.max(0.6,Math.min(1.6,Math.round(zoomLevel*100)/100));
  applyZoom();
  toast('줌: '+Math.round(zoomLevel*100)+'%');
},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='0'){e.preventDefault();zoomLevel=1;applyZoom();toast('줌 초기화')}
});

document.addEventListener('keydown',e=>{
  // 새로고침: Ctrl+F5만 허용, F5/Ctrl+R/Ctrl+Shift+R 차단
  if(e.key==='F5'){if(e.ctrlKey){toast('🔄 새로고침');return}e.preventDefault();return}
  if(e.ctrlKey&&(e.key==='r'||e.key==='R')){e.preventDefault();return}
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();return}
  if(e.ctrlKey&&e.shiftKey&&e.key==='Z'){e.preventDefault();redo();return}
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();save();toast('저장 완료')}
  if(e.ctrlKey&&e.key==='n'){e.preventDefault();newPage('memo')}
  // Ctrl+A: 현재 영역 내부만 전체 선택
  if(e.ctrlKey&&e.key==='a'){
    const ae=document.activeElement;
    // 블록 편집 중이면 해당 블록 내용만 선택
    if(ae&&ae.contentEditable==='true'){e.preventDefault();document.execCommand('selectAll');return}
    // 시트 셀 편집 중이면 해당 셀만 선택
    if(ae&&ae.tagName==='INPUT'&&ae.closest('.stbl')){e.preventDefault();ae.select();return}
    // 그 외: area 영역만 선택
    const area=document.getElementById('area');
    if(area){e.preventDefault();const range=document.createRange();range.selectNodeContents(area);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range)}
  }
  if(e.ctrlKey&&e.key==='`'){e.preventDefault();toggleTerm();return}
  if(e.ctrlKey&&e.shiftKey&&e.key==='T'){e.preventDefault();addTermTab();return}
  if(e.ctrlKey&&e.shiftKey&&e.key==='S'){e.preventDefault();splitTerm();return}
  if(e.ctrlKey&&e.shiftKey&&e.key==='W'){e.preventDefault();if(activeTermId)closeTermTab(activeTermId);return}
  if(e.key==='Escape'){closeEvM();document.getElementById('icoModal').classList.remove('show');closePdfM();closeFileImport()}
});

// TERMINAL (다중 탭 + 분할)
// ══════════════════════════════════════════
const terms={};// {id:{term,fitAddon,panelEl}}
let activeTermId=null;
let termCount=0;

const TERM_THEME={cursorBlink:true,fontSize:13,fontFamily:"Consolas,'Courier New',monospace",
  theme:{background:'#0a0a0a',foreground:'#d4d4d4',cursor:'#60a5fa',
    black:'#1e1e1e',red:'#f87171',green:'#4ade80',yellow:'#fbbf24',
    blue:'#60a5fa',magenta:'#a78bfa',cyan:'#22d3ee',white:'#e4e4e7'},
  allowProposedApi:true,rightClickSelectsWord:true};

function toggleTerm(){
  const w=document.getElementById('termWrap');
  w.classList.toggle('open');
  if(w.classList.contains('open')){
    if(!Object.keys(terms).length)addTermTab();
    else{const t=terms[activeTermId];if(t){setTimeout(()=>{t.fitAddon.fit();t.term.focus()},100)}}
  }
}

function addTermTab(){
  if(!window.Terminal||!window.nexus)return;
  termCount++;
  const id='t'+Date.now();
  // 패널 생성
  const panel=document.createElement('div');
  panel.className='term-panel';panel.id='tp-'+id;
  document.getElementById('termSplit').appendChild(panel);
  // xterm 생성
  const t=new Terminal(TERM_THEME);
  const fa=new FitAddon.FitAddon();
  t.loadAddon(fa);t.open(panel);
  // 복사/붙여넣기
  t.attachCustomKeyEventHandler(e=>{
    if(e.type!=='keydown')return true;
    if((e.ctrlKey&&e.key==='c'&&t.hasSelection())||(e.ctrlKey&&e.shiftKey&&e.key==='C')){
      if(t.getSelection()&&window.nexus)window.nexus.copyText(t.getSelection());return false}
    if((e.ctrlKey&&e.key==='v')||(e.ctrlKey&&e.shiftKey&&e.key==='V')){
      if(window.nexus){const txt=window.nexus.pasteText();if(txt)window.nexus.termInput(id,txt)}return false}
    return true;
  });
  // IPC 연결
  t.onData(data=>window.nexus.termInput(id,data));
  t.onResize(({cols,rows})=>window.nexus.termResize(id,cols,rows));
  const termNum=Object.keys(terms).length+1;
  terms[id]={term:t,fitAddon:fa,panelEl:panel,name:'터미널 '+termNum};
  switchTermTab(id);
  // PTY 시작 → Claude 자동 실행
  setTimeout(()=>{
    fa.fit();const d=fa.proposeDimensions();
    window.nexus.termStart(id,d?.cols||120,d?.rows||30);
    // 2초 후 claude -c 자동 실행 (셸 준비 대기)
    setTimeout(()=>{window.nexus.termInput(id,'claude\r\n')},2000);
  },100);
  renderTermTabs();
  // 파일/폴더 드롭
  panel.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation()});
  panel.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();
    const files=e.dataTransfer.files;if(files.length&&window.nexus){
      const f=files[0];const p=f.path||f.name;
      // 폴더면 cd로 이동, 파일이면 경로 입력
      if(!f.type&&!f.name.includes('.')){
        window.nexus.termInput(id,'cd "'+p.replace(/\\/g,'/')+'"\r\n');
      }else{
        window.nexus.termInput(id,Array.from(files).map(f=>'"'+(f.path||f.name)+'"').join(' '));
      }
    }});
}

function switchTermTab(id){
  activeTermId=id;
  Object.entries(terms).forEach(([k,v])=>{v.panelEl.classList.toggle('active',k===id)});
  renderTermTabs();
  const t=terms[id];if(t)setTimeout(()=>{t.fitAddon.fit();t.term.focus()},50);
}

function closeTermTab(id){
  if(window.nexus)window.nexus.termKill(id);
  const t=terms[id];if(t){t.term.dispose();t.panelEl.remove();delete terms[id]}
  // 남은 탭 번호 재정렬
  Object.values(terms).forEach((t,i)=>{
    if(t.name.startsWith('터미널'))t.name='터미널 '+(i+1);
  });
  const keys=Object.keys(terms);
  if(keys.length)switchTermTab(keys[keys.length-1]);
  else{activeTermId=null;renderTermTabs()}
}

function splitTerm(){addTermTab();
  // 모든 패널 보이게 (분할)
  Object.values(terms).forEach(v=>v.panelEl.classList.add('active'));
  setTimeout(()=>Object.values(terms).forEach(v=>v.fitAddon.fit()),100);
}

function renderTermTabs(){
  const tabs=document.getElementById('termTabs');
  tabs.innerHTML=Object.entries(terms).map(([id,t])=>`
    <div class="term-tab ${id===activeTermId?'active':''}" onclick="switchTermTab('${id}')" ondblclick="event.stopPropagation();renameTermTab('${id}',this)">
      <span class="term-dot on"></span> <span class="tab-name">${esc(t.name)}</span>
      <span class="tab-close" onclick="event.stopPropagation();closeTermTab('${id}')">✕</span>
    </div>`).join('');
}

function renameTermTab(id,tabEl){
  const t=terms[id];if(!t)return;
  const nameEl=tabEl.querySelector('.tab-name');
  const input=document.createElement('input');
  input.type='text';input.value=t.name;
  input.style.cssText='background:var(--bg);border:1px solid var(--accent);color:var(--text);font-size:11px;padding:1px 4px;border-radius:3px;width:80px;outline:none';
  nameEl.textContent='';nameEl.appendChild(input);
  input.focus();input.select();
  const done=()=>{
    const name=input.value.trim()||t.name;
    t.name=name;renderTermTabs();
  };
  input.addEventListener('blur',done);
  input.addEventListener('keydown',e=>{
    e.stopPropagation();
    if(e.key==='Enter'){e.preventDefault();done()}
    if(e.key==='Escape'){renderTermTabs()}
  });
}

// IPC 수신 (다중)
if(window.nexus){
  window.nexus.onTermData((id,data)=>{const t=terms[id];if(t)t.term.write(data)});
  window.nexus.onTermExit(id=>{const t=terms[id];if(t){t.term.write('\r\n\x1b[31m세션 종료\x1b[0m\r\n');renderTermTabs()}});
}

// 전체 resize
window.addEventListener('resize',()=>{Object.values(terms).forEach(t=>{t.fitAddon.fit();if(window.nexus){const d=t.fitAddon.proposeDimensions();if(d)window.nexus.termResize(Object.keys(terms).find(k=>terms[k]===t),d.cols,d.rows)}})});

// Terminal resize drag
(function(){
  const bar=document.getElementById('termBar');
  const wrap=document.getElementById('termWrap');
  if(!bar||!wrap)return;
  let dragging=false,startY=0,startH=0;
  bar.addEventListener('mousedown',e=>{
    if(e.target.tagName==='BUTTON')return;
    dragging=true;startY=e.clientY;startH=wrap.offsetHeight;
    document.addEventListener('mousemove',onDrag);document.addEventListener('mouseup',stopDrag);
  });
  function onDrag(e){
    if(!dragging)return;
    const h=startH-(e.clientY-startY);
    wrap.style.height=Math.max(100,Math.min(h,window.innerHeight*0.8))+'px';
    // 모든 터미널 탭 리사이즈
    Object.entries(terms).forEach(([id,t])=>{
      t.fitAddon.fit();
      if(window.nexus){const d=t.fitAddon.proposeDimensions();if(d)window.nexus.termResize(id,d.cols,d.rows)}
    });
  }
  function stopDrag(){
    dragging=false;
    document.removeEventListener('mousemove',onDrag);
    document.removeEventListener('mouseup',stopDrag);
    // 드래그 끝나고 한번 더 리사이즈
    setTimeout(()=>{
      Object.entries(terms).forEach(([id,t])=>{
        t.fitAddon.fit();
        if(window.nexus){const d=t.fitAddon.proposeDimensions();if(d)window.nexus.termResize(id,d.cols,d.rows)}
      });
    },100);
  }
})();

// WEB NOTIFICATIONS (일정 알림)
// ══════════════════════════════════════════
const _notified=new Set();
function startWebReminder(){
  // 알림 권한 요청
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
  setInterval(()=>{
    if(!('Notification' in window)||Notification.permission!=='granted')return;
    try{
      const events=D.globalEvents||[];
      const now=new Date();
      const today=now.toISOString().slice(0,10);
      const nowMin=now.getHours()*60+now.getMinutes();
      events.forEach(e=>{
        if(e.date!==today||e.allDay||!e.startTime)return;
        const [h,m]=e.startTime.split(':').map(Number);
        const evMin=h*60+m;
        const diff=evMin-nowMin;
        // 10분 전 알림
        if(diff>0&&diff<=10&&!_notified.has(e.id+today)){
          _notified.add(e.id+today);
          new Notification('📅 '+diff+'분 후 — '+e.title,{
            body:(e.startTime+(e.endTime?'~'+e.endTime:'')+(e.note?'\n'+e.note:'')),
            icon:'icon.png'
          });
          toast('📅 '+diff+'분 후 — '+e.title);
        }
        // 정시 알림
        if(diff===0&&!_notified.has(e.id+today+'_now')){
          _notified.add(e.id+today+'_now');
          new Notification('🔔 지금 — '+e.title,{
            body:(e.startTime+(e.endTime?'~'+e.endTime:'')+(e.note?'\n'+e.note:'')),
            icon:'icon.png'
          });
          toast('🔔 지금 — '+e.title);
        }
      });
      // 자정 리셋
      if(now.getHours()===0&&now.getMinutes()===0)_notified.clear();
    }catch(e){}
  },30000);
}

    return;
  }
  // 그 외 영역이면 파일 가져오기

});
